id: linkhub.shortener.policies.standard_encryption
type: policy
name: StandardEncryption
description: All data must be encrypted at rest and in transit.
status: active
owner: platform-team
kind: security
authentication:
  required: false
  mechanism: none
authorisation:
  roles: []
  permissions: []
  rule: "public access allowed"
encryption:
  at_rest: true
  in_transit: true
  field_level: false
