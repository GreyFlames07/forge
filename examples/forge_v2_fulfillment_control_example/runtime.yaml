schema: forge.v2.runtime

runtime:
  containers:
    - id: customer_portal
      description: Customer-facing web application for post-purchase order visibility and returns.
      kind: client_side_web_application
      technology: Next.js
      responsibilities:
        - Render checkout follow-up, tracking, and return experiences.
        - Collect return requests and display fulfillment outcomes.
        - Send customer actions to orchestration APIs.
      security: >
        Must only communicate with backend services over HTTPS, protect session
        tokens in secure browser mechanisms, and never persist sensitive
        provider tokens in client-visible storage.
    - id: operations_console
      description: Internal console used by warehouse and finance staff to resolve shortages and review returns.
      kind: client_side_web_application
      technology: React
      responsibilities:
        - Show shortage queues and return exceptions.
        - Collect staff recovery decisions.
        - Surface auditable operational actions.
      security: >
        Must require authenticated staff sessions, enforce role-aware UI
        authorization, and avoid exposing customer-sensitive fields beyond the
        minimum required for operations work.
    - id: orchestration_api
      description: Core backend API that validates requests, persists operational state, and coordinates external calls.
      kind: server_side_web_application
      technology: FastAPI
      responsibilities:
        - Accept fulfillment, shortage, and return requests.
        - Persist order, reservation, shortage, shipment, and return state.
        - Coordinate fraud, carrier, payment, and notification integrations.
      security: >
        Must enforce authenticated staff access on operational endpoints, redact
        provider secrets from logs, and validate all inbound payloads before
        any state mutation.
    - id: orchestration_worker
      description: Background worker that performs longer-running reallocation and refund completion tasks.
      kind: server_side_console_application
      technology: Python worker
      responsibilities:
        - Continue shortage recovery work after staff decisions.
        - Finalize refund and notification side effects.
        - Perform compensating updates when external calls fail.
      security: >
        Must only run with least-privilege credentials, consume signed work
        items, and emit auditable logs without leaking customer or provider
        secrets.
    - id: fulfillment_db
      description: Primary relational database for fulfillment orders, reservations, shipment plans, shortage cases, and returns.
      kind: database
      technology: PostgreSQL
      responsibilities:
        - Store operational lifecycle state.
        - Support transactional reads and writes for orchestration flows.
        - Retain auditable history required for exception handling.
      security: >
        Must only accept connections from approved application containers and
        must encrypt persisted operational and customer data at rest.
    - id: fraud_gateway
      description: External fraud scoring provider used before order fulfillment is confirmed.
      kind: external_container
      technology: Fraud scoring API
      responsibilities:
        - Score fulfillment requests for risk.
        - Return approve, review, or reject outcomes.
      security: >
        Must be called over secure transport using provider-managed
        credentials and only with the minimum data required for scoring.
    - id: carrier_gateway
      description: External carrier integration used to book labels and arrange shipment pickup.
      kind: external_container
      technology: Carrier booking API
      responsibilities:
        - Reserve shipment labels.
        - Return booking confirmations or booking failures.
      security: >
        Must be called only with approved shipping metadata and over secure
        provider transport.
    - id: payments_gateway
      description: External payment provider used to issue refunds for approved returns.
      kind: external_container
      technology: Payment refund API
      responsibilities:
        - Create refund instructions.
        - Return refund completion or failure outcomes.
      security: >
        Must be called only from trusted backend containers with managed
        credentials and must not receive raw card data from this system.
    - id: notification_gateway
      description: External notification provider used to send customer and staff messages.
      kind: external_container
      technology: Transactional notification API
      responsibilities:
        - Deliver customer-facing status updates.
        - Deliver operator-facing exception alerts.
      security: >
        Must only receive message payloads that are already policy-approved and
        must not be used as a source of truth for system state.
  relationships:
    - from: customer_portal
      to: orchestration_api
      description: Sends order tracking and return requests over HTTPS JSON APIs.
    - from: operations_console
      to: orchestration_api
      description: Sends shortage recovery and exception review actions over HTTPS JSON APIs.
    - from: orchestration_api
      to: orchestration_worker
      description: Dispatches longer-running recovery and refund jobs for background completion.
    - from: orchestration_api
      to: fulfillment_db
      description: Reads and writes fulfillment state using SQL transactions.
    - from: orchestration_worker
      to: fulfillment_db
      description: Reads and updates recovery, shipment, and refund state using SQL transactions.
    - from: orchestration_api
      to: fraud_gateway
      description: Sends fulfillment risk checks over HTTPS before booking inventory.
    - from: orchestration_api
      to: carrier_gateway
      description: Sends shipment booking requests over HTTPS.
    - from: orchestration_worker
      to: carrier_gateway
      description: Sends follow-up shipment rebooking requests during recovery flows.
    - from: orchestration_worker
      to: payments_gateway
      description: Sends refund requests over HTTPS for approved returns.
    - from: orchestration_api
      to: notification_gateway
      description: Sends immediate customer and staff notifications over HTTPS.
    - from: orchestration_worker
      to: notification_gateway
      description: Sends asynchronous recovery and refund outcome notifications over HTTPS.
