id: cli
name: CLI Runtime
description: Tiny Python CLI runtime for smoke testing.
kind: cli
purpose: Expose the bootstrap status command.
owned_by: forge.examples
entrypoint: apps/cli/src/main.py
serves_verticals:
- core
- reports
run:
  dev: python3 apps/cli/src/main.py status
  test: python3 apps/cli/src/main.py status
  prod: python3 apps/cli/src/main.py status
env: []
depends_on:
  units: []
  stores: []
  externals: []
healthcheck:
  kind: command
  target: python3 apps/cli/src/main.py health
promotion:
  independently_promotable: true
  notes: Command-line bootstrap runtime for local smoke tests.
