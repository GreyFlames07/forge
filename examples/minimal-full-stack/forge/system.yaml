schema_version: forge.v2
system:
  id: minimal_full_stack
  name: Minimal Full Stack
  project_profile: full-stack
  description: A tiny full-stack project used to smoke-test Forge V2 behavior.
  purpose: Demonstrate a bootstrap-preserving full-stack shape with explicit contracts.
  goals:
  - Load a dashboard payload from an API endpoint.
  - Render a user-facing dashboard route in the app.
  - Expand to a second profile slice without regressing bootstrap.
  - Keep the system runnable while the schema evolves.
  invariants:
  - The bootstrap path must stay working.
  - Public behavior must be expressed through canonical operations and types.
  auth_contexts:
  - id: anonymous
    description: Unauthenticated caller
  security:
    posture:
    - Health and dashboard reads are allowed anonymously in this minimal example.
    data_handling:
    - No sensitive data is stored in canonical records.
  environments:
  - id: dev
    description: Local development
  - id: prod
    description: Production deployment
  promotion_stages:
  - dev
  - prod
