schema: forge.v2.runtime_flow

runtime_flow:
  id: place_fulfillment_order_runtime
  high_level_flow: place_fulfillment_order
  description: >
    Realizes order intake by validating the customer request, checking fraud,
    reserving inventory, booking shipment, and issuing either a confirmation,
    shortage, or rejection outcome.
  trigger: >
    {
      customer_id: string,
      sales_channel: string @enum[web, mobile],
      line_items: [
        {
          sku: string,
          quantity: integer @min(1)
        }
      ],
      delivery_address: {
        line_1: string,
        line_2?: string,
        city: string,
        postcode: string,
        country_code: string @enum[AU, NZ, US]
      },
      payment_reference: string
    }
  steps:
    - id: 1
      container: customer_portal
      description: Validates the checkout follow-up payload and forwards the fulfillment request to the backend.
      next: 2
      outgoing: >
        {
          customer_id: string,
          sales_channel: string @enum[web, mobile],
          line_items: [
            {
              sku: string,
              quantity: integer @min(1)
            }
          ],
          delivery_address: {
            line_1: string,
            line_2?: string,
            city: string,
            postcode: string,
            country_code: string @enum[AU, NZ, US]
          },
          payment_reference: string
        }
    - id: 2
      container: orchestration_api
      description: Validates the request and sends the minimal fraud scoring payload to the fraud provider.
      next: 3
      outgoing: >
        {
          customer_id: string,
          payment_reference: string,
          order_amount: decimal,
          country_code: string @enum[AU, NZ, US]
        }
    - id: 3
      container: fraud_gateway
      description: Scores the order and returns the fraud decision to the orchestration API.
      branches:
        - condition: Fraud provider approves the order.
          next: 4
          outgoing: >
            {
              decision: enum[approved],
              risk_band: enum[low, medium]
            }
        - condition: Fraud provider requires manual review or rejects the order.
          next: 8
          outgoing: >
            {
              decision: enum[manual_review, rejected],
              failure_reason: string
            }
    - id: 4
      container: orchestration_api
      description: Creates the order and inventory reservation records and prepares a carrier booking request.
      branches:
        - condition: Inventory reservation succeeds.
          next: 5
          outgoing: >
            {
              order_id: string,
              shipment_mode: enum[standard, express],
              packages: [
                {
                  package_id: string,
                  weight_kg: decimal
                }
              ],
              destination: {
                city: string,
                postcode: string,
                country_code: string @enum[AU, NZ, US]
              }
            }
        - condition: Inventory reservation fails or only partially succeeds.
          next: 7
          outgoing: ref[shortage_case_record]
    - id: 5
      container: carrier_gateway
      description: Books the shipment and returns the carrier outcome.
      branches:
        - condition: Carrier booking succeeds.
          next: 6
          outgoing: ref[shipment_plan_record]
        - condition: Carrier booking fails after inventory is reserved.
          next: 7
          outgoing: ref[shortage_case_record]
    - id: 6
      container: orchestration_api
      description: Persists the shipment plan, updates the order to confirmed, and builds a fulfillment confirmation response.
      next: 9
      outgoing: ref[fulfillment_confirmation_response]
    - id: 7
      container: orchestration_api
      description: Persists the shortage case, queues operational follow-up, and builds a shortage response for the customer.
      next: 9
      outgoing: ref[shortage_resolution_response]
    - id: 8
      container: orchestration_api
      description: Builds a rejection response for the customer without committing fulfillment state.
      next: 9
      outgoing: ref[fulfillment_rejection_response]
    - id: 9
      container: customer_portal
      description: Displays the confirmed, delayed, or rejected fulfillment outcome to the customer.
  outcomes:
    - Customer sees a confirmed fulfillment order with shipment details.
    - Customer sees a shortage recovery message with next steps.
    - Customer sees a fraud or validation rejection outcome.
