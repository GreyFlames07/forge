schema: forge.v2.runtime_flow

runtime_flow:
  id: recover_inventory_shortage_runtime
  high_level_flow: recover_inventory_shortage
  description: >
    Realizes shortage recovery by collecting an operator decision, dispatching
    background recovery work, updating operational state, and notifying the
    customer and staff of the final resolution path.
  trigger: ref[shortage_case_record]
  steps:
    - id: 1
      container: operations_console
      description: Shows the shortage case and submits the operator-selected recovery action.
      next: 2
      outgoing: >
        {
          shortage_case_id: string,
          operator_id: string,
          selected_resolution: enum[reroute_inventory, partial_ship, cancel_order],
          resolution_notes?: string
        }
    - id: 2
      container: orchestration_api
      description: Validates the operator decision, updates the case to in progress, and dispatches background recovery work.
      next: 3
      outgoing: >
        {
          shortage_case_id: string,
          order_id: string,
          selected_resolution: enum[reroute_inventory, partial_ship, cancel_order],
          operator_id: string
        }
    - id: 3
      container: orchestration_worker
      description: Executes the selected recovery path, including reallocation, partial shipment updates, or cancellation handling.
      branches:
        - condition: Recovery succeeds through reroute or partial shipment.
          next: 4
          outgoing: ref[shortage_resolution_response]
        - condition: Recovery ends in cancellation or unrecoverable failure.
          next: 4
          outgoing: ref[shortage_resolution_response]
    - id: 4
      container: orchestration_api
      description: Persists the final shortage and order state and triggers the relevant notifications.
      next: 5
      outgoing: ref[shortage_resolution_response]
    - id: 5
      container: operations_console
      description: Displays the final shortage resolution outcome to the operator.
  outcomes:
    - Operator sees a reroute or partial shipment success outcome.
    - Operator sees a cancellation or failure closure outcome.
