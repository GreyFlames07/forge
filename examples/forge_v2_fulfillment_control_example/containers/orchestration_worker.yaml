schema: forge.v2.container

container:
  id: orchestration_worker
  description: >
    Internal component structure for the background worker, showing how longer
    running shortage recovery and refund completion work is executed after the
    API hands off control.
  components:
    - id: recovery_job_handler
      description: Entry component that claims and validates background recovery or refund jobs.
      responsibilities:
        - Claim work items.
        - Validate job type and current state preconditions.
    - id: reallocation_service
      description: Performs inventory reroute, partial shipment, and cancellation recovery logic.
      responsibilities:
        - Execute shortage recovery decisions.
        - Prepare rebooking and compensation actions.
    - id: refund_service
      description: Completes approved refund work after return completion.
      responsibilities:
        - Create refund instructions.
        - Interpret payment provider outcomes.
    - id: worker_repository
      description: Reads and updates persisted recovery and refund state.
      responsibilities:
        - Load and update shortage, shipment, order, and return records.
        - Persist final background outcomes.
    - id: notification_dispatcher
      description: Sends asynchronous customer and staff notifications after background work completes.
      responsibilities:
        - Dispatch recovery outcome notifications.
        - Dispatch refund success or failure notifications.
  component_flows:
    - id: recover_inventory_shortage_worker
      runtime_flow: recover_inventory_shortage_runtime
      description: >
        Executes the background portion of shortage recovery after the API
        dispatches the operator-selected action.
      trigger: >
        {
          shortage_case_id: string,
          order_id: string,
          selected_resolution: enum[reroute_inventory, partial_ship, cancel_order],
          operator_id: string
        }
      steps:
        - id: 1
          component: recovery_job_handler
          description:
            - Claim the shortage recovery job.
            - Validate the case is still eligible for processing.
            - Route the work to the reallocation service.
          next: 2
          outgoing: >
            {
              shortage_case_id: string,
              order_id: string,
              selected_resolution: enum[reroute_inventory, partial_ship, cancel_order]
            }
        - id: 2
          component: reallocation_service
          description:
            - Execute reroute, partial shipment, or cancellation logic.
            - Call carrier rebooking when a shipment path remains viable.
            - Build the final operational outcome contract.
          branches:
            - condition: Recovery ends in reroute or partial shipment.
              next: 3
              outgoing: ref[shortage_resolution_response]
            - condition: Recovery ends in cancellation or failure.
              next: 3
              outgoing: ref[shortage_resolution_response]
        - id: 3
          component: worker_repository
          description:
            - Persist the final shortage, order, reservation, and shipment state.
            - Return the notification-ready outcome payload.
          next: 4
          outgoing: ref[shortage_resolution_response]
        - id: 4
          component: notification_dispatcher
          description:
            - Send the final customer and staff notifications.
            - Complete the background job.
    - id: process_refund_completion_worker
      runtime_flow: process_return_and_refund_runtime
      description: >
        Executes the background portion of approved returns after the item is
        received or otherwise marked ready for refund.
      trigger: ref[return_request_record]
      steps:
        - id: 1
          component: recovery_job_handler
          description:
            - Claim the refund-completion job.
            - Validate that the return is in a refundable state.
            - Route the work to the refund service.
          next: 2
          outgoing: ref[return_request_record]
        - id: 2
          component: refund_service
          description:
            - Create the refund request to the payment provider.
            - Interpret the provider result.
            - Build the final return status payload.
          branches:
            - condition: Refund completes successfully.
              next: 3
              outgoing: ref[return_status_response]
            - condition: Refund fails and needs follow-up.
              next: 3
              outgoing: ref[return_status_response]
        - id: 3
          component: worker_repository
          description:
            - Persist the final refund state back to the return request.
            - Return the notification-ready payload.
          next: 4
          outgoing: ref[return_status_response]
        - id: 4
          component: notification_dispatcher
          description:
            - Send the customer-visible refund outcome notification.
            - Complete the background job.
