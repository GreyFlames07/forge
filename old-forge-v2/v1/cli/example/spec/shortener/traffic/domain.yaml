id: linkhub.shortener.traffic
type: domain
name: Traffic
description: Domain responsible for serving redirects and recording click analytics.
status: active
owner: platform-team
responsibility: >
  Handles the high-volume redirect path. Resolves short codes (delegating to the
  Links domain), issues HTTP 301 responses, and asynchronously records click events.
  Does not own link data; consumes the Links domain via contract.
modules:
  - linkhub.shortener.traffic.redirector
  - linkhub.shortener.traffic.click_recorder
policies:
  - linkhub.shortener.policies.redirect_sla
