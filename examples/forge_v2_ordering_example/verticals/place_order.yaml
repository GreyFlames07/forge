schema: forge.v2.vertical

verticals:
  - id: place_order
    description: End-to-end implementation slice for checkout submission, payment authorization, and customer-visible order outcome.
    user_value: Customers can submit an order and immediately learn whether it was accepted or rejected.
    high_level_flows:
      - place_order
    runtime_containers:
      - storefront_web
      - ordering_api
      - orders_db
      - payment_gateway
    data_shapes:
      - order_record
      - payment_attempt_record
      - order_confirmation_response
      - order_rejection_response
    persistent_shapes:
      - order
      - payment_attempt
    deployment_notes: >
      Requires the storefront, ordering API, primary database, and payment
      provider integration to be available in the target environment.
    build_notes: >
      Build this vertical by first making checkout reach the ordering API, then
      persist order state, then record payment attempts, then return confirmed
      and rejected customer-facing responses.
