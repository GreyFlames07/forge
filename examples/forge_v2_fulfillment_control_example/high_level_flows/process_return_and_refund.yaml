schema: forge.v2.high_level_flow

high_level_flow:
  id: process_return_and_refund
  description: >
    A customer requests a return, the system checks policy and delivery state,
    and the approved request is refunded after return completion.
  trigger: Customer starts a return for a delivered order.
  steps:
    - id: 1
      description: Customer submits the return request with items and reason.
      next: 2
    - id: 2
      description: System checks eligibility and creates the return case.
      branches:
        - condition: Return is eligible and can proceed.
          next: 3
        - condition: Return is not eligible.
          next: 5
    - id: 3
      description: System issues the return instructions and waits for completion.
      next: 4
    - id: 4
      description: System completes the refund after the return is received or approved.
    - id: 5
      description: System informs the customer that the return was denied.
  outcomes:
    - Return is approved and refunded.
    - Return is denied with a customer-visible reason.
