name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check src tests

      - name: Typecheck
        run: mypy

      - name: Run tests
        run: pytest -q

      - name: Compile source
        run: python -m compileall -q src/cli/__init__.py src/cli/__main__.py src/cli/common.py src/cli/forge.py src/cli/yaml_io.py src/cli/commands

      - name: Build distributions
        run: |
          rm -rf build dist
          find src/cli/resources/skills -type d -name '__pycache__' -prune -exec rm -rf {} +
          find src/cli/resources/skills -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/forge-wheel-venv
          /tmp/forge-wheel-venv/bin/python -m ensurepip --upgrade >/dev/null
          /tmp/forge-wheel-venv/bin/python -m pip install dist/*.whl
          /tmp/forge-wheel-venv/bin/forge --help >/dev/null

      - name: Smoke test init onboarding
        run: |
          tmpdir="$(mktemp -d)"
          /tmp/forge-wheel-venv/bin/forge init --root "$tmpdir" --name "CI Project" --id ci_project --no-animation >/tmp/forge-init.log
          test -f "$tmpdir/business-plan.md"
          test -f "$tmpdir/forge/USING_FORGE.md"
          test -f "$tmpdir/forge/SCHEMA_REFERENCE_V4.md"
          test -f "$tmpdir/forge/FRAMEWORK_V4.md"
          test -f "$tmpdir/forge/decisions.yaml"
          test ! -f "$tmpdir/forge/SCHEMA_REFERENCE_V3.md"
          test ! -f "$tmpdir/forge/FRAMEWORK_V3.md"
          test -f "$tmpdir/forge/skills/forge-business/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-schema/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-build/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-hydrate/SKILL.md"
          test -L "$tmpdir/.codex/skills/forge-build"
          test -L "$tmpdir/.claude/skills/forge-schema"
          test -L "$tmpdir/.agents/skills/forge-review"
          test -L "$tmpdir/.copilot/skills/forge-security"
          grep -q "Start With Skills" "$tmpdir/forge/USING_FORGE.md"
