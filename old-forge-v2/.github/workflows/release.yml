name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Verify tag matches package version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tomllib

          tag = "${{ github.ref_name }}"
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = pyproject["project"]
          if "version" in project:
              version = project["version"]
          else:
              dynamic = pyproject.get("tool", {}).get("setuptools", {}).get("dynamic", {})
              attr = dynamic.get("version", {}).get("attr")
              if not attr:
                  raise SystemExit("Could not resolve package version from pyproject.toml")
              module_name, attr_name = attr.rsplit(".", 1)
              module_path = Path("src") / Path(*module_name.split("."))
              init_path = module_path.with_suffix(".py")
              if not init_path.exists():
                  init_path = module_path / "__init__.py"
              namespace = {}
              exec(init_path.read_text(encoding="utf-8"), namespace)
              version = namespace.get(attr_name)
              if not version:
                  raise SystemExit(f"Could not resolve {attr} from {init_path}")
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"Tag/version mismatch: tag={tag}, package={expected}")
          PY

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
