schema: forge.v2.data_shape

data_shapes:
  - id: shortage_resolution_response
    description: Customer-facing or operator-facing status payload for shortage recovery outcomes.
    kind: payload
    shape:
      shortage_case_id: string
      order_id: string
      resolution_status: enum[awaiting_recovery, rerouted, partial_shipment, canceled, failed]
      customer_message: string
      operator_summary: string
