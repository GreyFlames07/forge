bootstrap:
  description: Run the worker once through the canonical bootstrap path.
  required_units:
  - worker
  required_stores:
  - main
  required_surfaces:
  - run_demo_job_internal
  path:
  - run_demo_job_internal
  success_criteria:
  - The worker healthcheck returns worker-ok.
  - The worker run-once command prints a processed result.
  preserve: true
