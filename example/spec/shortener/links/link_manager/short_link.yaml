id: linkhub.shortener.links.link_manager.short_link
type: element
name: ShortLink
description: A short link mapping an 8-char code to a destination URL.
status: active
owner: platform-team
kind: aggregate
properties:
  - id: linkhub.shortener.links.link_manager.short_link.code
    type: property
    name: code
    description: Globally unique 8-character alphanumeric code.
    status: active
    data_type: linkhub.shortener.types.ShortCode
    is_array: false
    is_nullable: false
    embedding: inline
    visibility: public

  - id: linkhub.shortener.links.link_manager.short_link.destination_url
    type: property
    name: destination_url
    description: The full URL this short link redirects visitors to.
    status: active
    data_type: linkhub.shortener.types.URL
    is_array: false
    is_nullable: false
    embedding: inline
    visibility: public

  - id: linkhub.shortener.links.link_manager.short_link.label
    type: property
    name: label
    description: Optional human-readable label for the creator's reference.
    status: active
    data_type: system.types.String
    is_array: false
    is_nullable: true
    embedding: inline
    visibility: internal

  - id: linkhub.shortener.links.link_manager.short_link.created_at
    type: property
    name: created_at
    description: UTC timestamp when this short link was created.
    status: active
    data_type: system.types.Timestamp
    is_array: false
    is_nullable: false
    embedding: inline
    visibility: public

  - id: linkhub.shortener.links.link_manager.short_link.is_active
    type: property
    name: is_active
    description: Whether the link is currently resolving. Inactive links return LinkNotFound.
    status: active
    data_type: system.types.Boolean
    is_array: false
    is_nullable: false
    embedding: inline
    visibility: internal

operations:
  - id: linkhub.shortener.links.link_manager.short_link.create
    type: operation
    name: create
    description: Creates a new short link from a destination URL; generates a unique code.
    status: active
    kind: command
    inputs:
      - linkhub.shortener.types.CreateLinkInput
    outputs:
      - linkhub.shortener.types.ShortCode
    raises:
      - linkhub.shortener.errors.InvalidUrl
      - system.errors.Unauthorized
    visibility: public
    contract: linkhub.shortener.contracts.create_short_link
    policies:
      - linkhub.shortener.policies.creator_auth
    steps:
      - order: 1
        description: Validate the destination URL is well-formed and uses an allowed scheme (http/https).
        raises:
          - linkhub.shortener.errors.InvalidUrl
      - order: 2
        description: Verify the caller is authenticated and holds write permission.
        raises:
          - system.errors.Unauthorized
      - order: 3
        description: Generate a cryptographically random 8-character alphanumeric ShortCode, retrying on collision.
      - order: 4
        description: Persist the ShortLink record (code, destination_url, created_at, is_active=true) to the primary datastore.
        calls: linkhub.shortener.datastores.links_db
      - order: 5
        description: Return the generated ShortCode to the caller.

  - id: linkhub.shortener.links.link_manager.short_link.resolve
    type: operation
    name: resolve
    description: Resolves a short code to its destination URL; raises LinkNotFound if inactive or absent.
    status: active
    kind: query
    inputs:
      - linkhub.shortener.types.ShortCode
    outputs:
      - linkhub.shortener.types.URL
    raises:
      - linkhub.shortener.errors.LinkNotFound
    visibility: public
    contract: linkhub.shortener.contracts.resolve_short_link
    policies: []

relationships:
  - target: linkhub.shortener.traffic.click_recorder.click
    type: references
    multiplicity: one_to_many

policies: []
