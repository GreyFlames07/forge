id: linkhub.shortener.types.URL
type: type
name: URL
description: A fully-qualified HTTP or HTTPS URL including scheme, host, and optional path.
status: active
kind: scalar
base: system.types.String
constraints:
  pattern: "^https?://.+"
  max_length: 2048
examples:
  - https://example.com/some/long/path?query=value
  - https://docs.internal.company.com/engineering/handbook
