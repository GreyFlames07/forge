id: bootstrap-plan
target: bootstrap
summary: Establish the first runnable path and preserve it while expanding capability.
slices:
- id: slice-001
  name: Bootstrap slice
  goal: Run the CLI status command through the canonical bootstrap path.
  touches:
    units:
    - cli
    verticals:
    - core
    operations:
    - show_status
    surfaces:
    - status_cli
    flows:
    - cli_status_flow
  checks:
  - verification.startup.cli_health
  operator_checks:
  - verification.flows.cli_report_flow
  - verification.flows.cli_status_flow
  status: planned
  bootstrap_effect: establish
- id: slice-002
  name: CLI Report Flow
  goal: Add a second development slice to the CLI example.
  touches:
    units:
    - cli
    verticals:
    - reports
    operations:
    - show_report
    surfaces:
    - report_cli
    flows:
    - cli_report_flow
  checks:
  - verification.flows.cli_report_flow
  operator_checks: []
  status: planned
  bootstrap_effect: preserve
