module:
  id:          USR
  name:        User Management
  description: >
    Manages user accounts, authentication state, and customer profiles.
    Owns the users table. Provides customer lookup to other modules.
    Entry point for the signup journey. Does not handle payment or
    notification logic — delegates to PAY and NTF via their interfaces.

  tech_stack:
    language:            typescript
    language_version:    "5.4"
    runtime:             node
    runtime_version:     "20.x"
    frameworks:          [nestjs@10, prisma@5]
    mandatory_libraries: [bcrypt@5, jsonwebtoken@9]

  owned_atoms:
    - atm.usr.fetch_customer
    - atm.usr.validate_email
    - atm.usr.create_account
    - atm.usr.verify_email
    - atm.usr.signup_email_screen
    - atm.usr.signup_password_screen
    - atm.usr.verify_sent_screen

  owned_artifacts: []

  persistence_schema:
    datastores:
      - name: users
        type: reg.usr.Customer
        form: relational
    storage_buckets: []
    caches: [user_sessions]
    ownership:   exclusive
    shared_with: []

  interface:
    entry_points:
      - kind:     api
        endpoint: /users/{id}
        method:   GET
        invokes:  atm.usr.fetch_customer

      - kind:     web_journey_entry
        endpoint: /signup
        invokes:  jrn.signup_flow
        security:
          authentication: none
          auth_methods:   []
          roles:          []

  access_permissions:
    env_vars:         [DATABASE_URL, JWT_SECRET]
    filesystem:       []
    network:          []
    secrets:          [jwt_signing_key]
    external_schemas: []

  dependency_whitelist:
    modules: [NTF, UI]

  policies: []

  changelog:
    - version:     "0.1.0"
      date:        "2026-04-10"
      change_type: added
      description: "Initial user management module."
