# Example L5 Operations for a payments-enabled app.

deployment:
  platform:
    cloud:              aws
    primary_region:     us-east-1
    additional_regions: [us-west-2]
    default_compute:    ecs-fargate
  environments: [dev, staging, prod]
  default_strategy: canary
  canary_weights:   [5, 25, 50, 100]
  rollback:
    automatic_on:
      - "error_rate > 5% for 5min"
      - "p99_latency > 2x baseline for 10min"
    manual_allowed: true

rate_limiting:
  default:
    requests_per_minute: 60
    burst:               100
  per_auth_method:
    bearer:
      requests_per_minute: 600
      burst:               1000
    api_key:
      requests_per_minute: 1200
      burst:               2000
  scope: per_actor

event_semantics:
  delivery:            at_least_once
  ordering:            fifo_per_key
  default_parallelism: 10
  ordering_key_field:  customer_id

observability:
  stack: prometheus-alertmanager-grafana
  defaults:
    latency_p99_ms:       500
    error_budget_percent: 1.0
    trace_sample_rate:    0.1
  modules:
    PAY:
      sla:
        latency_p99_ms:       200
        error_budget_percent: 0.5
      metrics:
        - name:    pay_requests_total
          type:    counter
          labels:  [atom, status, currency]
        - name:    pay_latency_seconds
          type:    histogram
          buckets: [0.05, 0.1, 0.2, 0.5, 1.0]
      traces:
        sample_rate: 0.5
      alerts:
        - name:     pay_high_error_rate
          expr:     'rate(pay_requests_total{status="error"}[5m]) / rate(pay_requests_total[5m]) > 0.005'
          severity: critical
          for:      5m
          annotations:
            summary: "PAY module error rate exceeds 0.5% budget"
            runbook: "https://runbooks.internal/pay-error-rate"
        - name:     pay_high_latency
          expr:     'histogram_quantile(0.99, rate(pay_latency_seconds_bucket[5m])) > 0.2'
          severity: warning
          for:      10m
          annotations:
            summary: "PAY p99 latency exceeds 200ms SLA"
      atom_overrides:
        atm.pay.charge_card:
          sla:
            latency_p99_ms:       100
            error_budget_percent: 0.1
          traces:
            sample_rate: 1.0
    USR:
      sla:
        latency_p99_ms:       300
        error_budget_percent: 1.0
      metrics:
        - name:    usr_signups_total
          type:    counter
          labels:  [status, method]
        - name:    usr_latency_seconds
          type:    histogram
          buckets: [0.1, 0.25, 0.5, 1.0, 2.5]
      traces:
        sample_rate: 0.1
      alerts:
        - name:     usr_signup_failure_spike
          expr:     'rate(usr_signups_total{status="error"}[10m]) > 0.1'
          severity: warning
          for:      5m
          annotations:
            summary: "USR signup failure rate elevated"
