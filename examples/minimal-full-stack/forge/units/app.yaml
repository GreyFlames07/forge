id: app
name: Frontend App
description: Static frontend shell for the minimal dashboard example.
kind: ui
purpose: Represent the user-facing runtime in the bootstrap path.
owned_by: forge.examples
entrypoint: apps/app/index.html
serves_verticals:
- core
- profile
run:
  dev: python3 -m http.server 4173 --directory apps/app
  test: python3 -m http.server 4173 --directory apps/app
  prod: serve apps/app as static assets
env: []
depends_on:
  units:
  - api
  stores: []
  externals: []
healthcheck:
  kind: none
  target: ''
promotion:
  independently_promotable: true
  notes: Static frontend shell for smoke testing.
