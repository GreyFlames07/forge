schema: forge.v2.persistent_shape

persistent_shapes:
  - id: shipment_plan
    description: Persisted shipment booking shape used for customer tracking and carrier coordination.
    data_shape: shipment_plan_record
    logical_owner_container: orchestration_api
    data_store_container: fulfillment_db
    storage_model: relational
    persistence_behavior: >
      Shipment plans are written when carrier booking succeeds and updated as
      tracking and delivery events arrive or when recovery changes the shipment path.
    lifecycle_status_notes: >
      Shipment plans move through booked, label created, in transit, delivered,
      or exception states depending on carrier activity.
    security: >
      Must retain traceable shipment history while keeping only the minimum
      customer address information necessary for fulfillment operations.
    state_machine:
      states:
        - booked
        - label_created
        - in_transit
        - delivered
        - exception
      transitions:
        - from: booked
          to: label_created
          condition: A printable label is generated.
        - from: label_created
          to: in_transit
          condition: The package is handed to the carrier.
        - from: in_transit
          to: delivered
          condition: The carrier confirms delivery.
        - from: booked
          to: exception
          condition: Booking or downstream movement enters an exception path.
        - from: in_transit
          to: exception
          condition: The carrier reports a movement exception.
