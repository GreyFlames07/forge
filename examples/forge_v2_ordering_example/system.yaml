schema: forge.v2.system

system:
  id: artisan_goods_marketplace
  purpose: Let customers discover handmade goods, place orders, and receive purchase updates online.
  description: >
    Artisan Goods Marketplace is an ecommerce system for browsing products from
    independent makers, submitting purchases, and tracking order outcomes,
    while internal staff manage catalog and order operations.
  boundary: >
    The system includes the customer storefront, the internal ordering
    application, the persistence required to support ordering workflows, and
    the deployment topology needed to run those parts. Payment processing and
    transactional email delivery are integrated but remain outside the system
    boundary.
  security: >
    All customer-facing traffic must use HTTPS, sensitive actions must be
    attributable to authenticated actors, and raw payment credentials must
    never be stored by the system.
  actors:
    - id: customer
      description: Browses products, places orders, and reviews order results.
      kind: human
    - id: operations_staff
      description: Reviews order activity and manages operational issues.
      kind: human
  external_dependencies:
    - id: stripe
      description: External payment processor used for payment authorization.
      kind: api
      documentation_url: https://docs.stripe.com
    - id: resend
      description: Transactional email provider used for order confirmation messaging.
      kind: service
      documentation_url: https://resend.com/docs
