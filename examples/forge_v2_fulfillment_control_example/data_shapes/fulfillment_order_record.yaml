schema: forge.v2.data_shape

data_shapes:
  - id: fulfillment_order_record
    description: Persisted state for a fulfillment order moving through screening, allocation, shipment, delivery, and exception outcomes.
    kind: state
    shape:
      order_id: string
      customer_id: string
      sales_channel: enum[web, mobile]
      line_items:
        - sku: string
          quantity: integer @min(1)
      delivery_address:
        line_1: string
        line_2?: string
        city: string
        postcode: string
        country_code: string @enum[AU, NZ, US]
      order_status: enum[pending_screening, pending_allocation, shortage_review, confirmed, partially_shipped, delivered, canceled, failed]
      created_at: datetime
      updated_at: datetime
