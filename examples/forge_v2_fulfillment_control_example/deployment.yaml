schema: forge.v2.deployment

deployment:
  environments:
    - id: production
      description: Live omnichannel fulfillment environment serving customers and operations staff.
      nodes:
        - id: customer_browser
          description: Browser runtime where the customer portal executes.
          kind: browser
          technology: Customer web browser
          containers:
            - customer_portal
          endpoint: https://orders.example.com
          region: global
          scaling_notes: Scales automatically with concurrent customer usage.
          availability_notes: Availability depends on customer device and internet connectivity.
          depends_on:
            - experience_edge
          trust_boundary: public_client_environment
        - id: staff_browser
          description: Browser runtime where the operations console executes.
          kind: browser
          technology: Managed staff web browser
          containers:
            - operations_console
          endpoint: https://ops.example.com
          region: global
          scaling_notes: Scales with concurrent staff sessions.
          availability_notes: Depends on corporate identity and network access.
          depends_on:
            - experience_edge
          trust_boundary: managed_staff_client
        - id: experience_edge
          description: Edge delivery and routing layer for both customer and staff applications.
          kind: cdn
          technology: CloudFront
          containers:
            - customer_portal
            - operations_console
          endpoint: https://orders.example.com
          region: global
          scaling_notes: Provider-managed horizontal scaling across edge locations.
          availability_notes: Multi-edge delivery with provider failover.
          depends_on:
            - orchestration_api_runtime
          trust_boundary: public_edge_network
        - id: orchestration_api_runtime
          description: Primary API runtime for fulfillment orchestration requests.
          kind: kubernetes_service
          technology: Kubernetes on AWS
          containers:
            - orchestration_api
          endpoint: https://api.fulfillment.example.com
          region: ap-southeast-2
          scaling_notes: Horizontally scales based on API latency and queue depth.
          availability_notes: Runs across multiple replicas and availability zones.
          depends_on:
            - orchestration_worker_runtime
            - fulfillment_database
            - fraud_provider_gateway
            - carrier_provider_gateway
            - notification_provider_gateway
          trust_boundary: private_application_network
        - id: orchestration_worker_runtime
          description: Background worker runtime for recovery and refund tasks.
          kind: kubernetes_service
          technology: Kubernetes on AWS
          containers:
            - orchestration_worker
          endpoint: worker.fulfillment.internal
          region: ap-southeast-2
          scaling_notes: Scales based on background job backlog and throughput targets.
          availability_notes: Runs with multiple replicas and automated restart policies.
          depends_on:
            - fulfillment_database
            - carrier_provider_gateway
            - payment_provider_gateway
            - notification_provider_gateway
          trust_boundary: private_application_network
        - id: fulfillment_database
          description: Managed relational database storing orders, reservations, shortage cases, shipments, and returns.
          kind: managed_database
          technology: PostgreSQL on Amazon RDS
          containers:
            - fulfillment_db
          endpoint: fulfillment-db.internal
          region: ap-southeast-2
          scaling_notes: Scales vertically and via read replicas as operational load grows.
          availability_notes: Multi-AZ deployment with automated backups and failover.
          depends_on: []
          trust_boundary: private_data_tier
        - id: fraud_provider_gateway
          description: Third-party fraud scoring API endpoint.
          kind: external_api
          technology: Fraud scoring API
          containers:
            - fraud_gateway
          endpoint: https://fraud.example.com
          region: provider_managed
          scaling_notes: Scales according to provider capacity.
          availability_notes: Availability is subject to provider SLAs.
          depends_on: []
          trust_boundary: third_party_boundary
        - id: carrier_provider_gateway
          description: Third-party carrier booking endpoint.
          kind: external_api
          technology: Carrier booking API
          containers:
            - carrier_gateway
          endpoint: https://carrier.example.com
          region: provider_managed
          scaling_notes: Scales according to provider capacity.
          availability_notes: Availability is subject to provider SLAs.
          depends_on: []
          trust_boundary: third_party_boundary
        - id: payment_provider_gateway
          description: Third-party refund processing endpoint.
          kind: external_api
          technology: Payment refund API
          containers:
            - payments_gateway
          endpoint: https://payments.example.com
          region: provider_managed
          scaling_notes: Scales according to provider capacity.
          availability_notes: Availability is subject to provider SLAs.
          depends_on: []
          trust_boundary: third_party_boundary
        - id: notification_provider_gateway
          description: Third-party messaging endpoint for customer and staff communications.
          kind: external_api
          technology: Notification API
          containers:
            - notification_gateway
          endpoint: https://notify.example.com
          region: provider_managed
          scaling_notes: Scales according to provider capacity.
          availability_notes: Availability is subject to provider SLAs.
          depends_on: []
          trust_boundary: third_party_boundary
