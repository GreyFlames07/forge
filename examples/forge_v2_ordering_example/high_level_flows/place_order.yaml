schema: forge.v2.high_level_flow

high_level_flow:
  id: place_order
  description: >
    A customer submits a purchase for the items in their cart and receives a
    confirmed or rejected result from the system.
  trigger: Customer submits the checkout form for the current cart.
  steps:
    - id: 1
      description: Customer reviews checkout details and submits the order.
      next: 2
    - id: 2
      description: System checks whether the order can proceed.
      branches:
        - condition: Order details are valid and payment can be attempted.
          next: 3
        - condition: Order details are invalid or cannot proceed.
          next: 5
    - id: 3
      description: System attempts to authorize payment and finalize the purchase.
      branches:
        - condition: Payment succeeds.
          next: 4
        - condition: Payment fails.
          next: 5
    - id: 4
      description: System confirms the accepted order to the customer.
    - id: 5
      description: System informs the customer that the order could not be completed.
  outcomes:
    - Order is accepted and confirmed.
    - Order is rejected and the customer is informed.
