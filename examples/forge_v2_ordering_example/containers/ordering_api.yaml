schema: forge.v2.container

container:
  id: ordering_api
  description: >
    Internal component structure for the ordering API, showing how checkout
    requests are validated, persisted, sent to the payment provider, and
    transformed into customer-facing outcomes.
  components:
    - id: order_request_controller
      description: Entry component for checkout requests from the storefront.
      responsibilities:
        - Accept order submission requests.
        - Forward normalized requests into the ordering workflow.
    - id: order_validation_service
      description: Validates business correctness of incoming order data.
      responsibilities:
        - Validate order input.
        - Decide whether the order can proceed.
    - id: order_repository
      description: Persists and retrieves order and payment attempt state.
      responsibilities:
        - Write order records.
        - Write payment attempt records.
        - Read stored order records.
    - id: payment_service
      description: Coordinates payment authorization with the external provider.
      responsibilities:
        - Build provider authorization requests.
        - Interpret provider outcomes.
    - id: order_response_mapper
      description: Builds customer-facing confirmation and rejection payloads.
      responsibilities:
        - Construct confirmation responses.
        - Construct rejection responses.
  component_flows:
    - id: place_order_internal
      runtime_flow: place_order_runtime
      description: >
        Realizes the ordering_api portion of the place_order runtime flow.
      trigger: >
          {
            customer_id: string,
            cart_id: string,
            line_items: [
              {
                product_id: string,
                quantity: integer
              }
            ],
            pricing_summary: {
              subtotal_amount: decimal,
              currency: string
            },
            delivery_address: {
              line_1: string,
              line_2?: string,
              city: string,
              postcode: string,
              country_code: string
            },
            payment_method_token: string
          }
      steps:
        - id: 1
          component: order_request_controller
          description:
            - Accept the checkout request from the storefront.
            - Perform request-shape validation checks.
            - Pass the normalized request to the validation service.
          next: 2
          outgoing: >
              {
                customer_id: string,
                cart_id: string,
                line_items: [
                  {
                    product_id: string,
                    quantity: integer
                  }
                ],
                pricing_summary: {
                  subtotal_amount: decimal,
                  currency: string
                },
                delivery_address: {
                  line_1: string,
                  line_2?: string,
                  city: string,
                  postcode: string,
                  country_code: string
                },
                payment_method_token: string
              }
        - id: 2
          component: order_validation_service
          description:
            - Validate the business correctness of the order request.
            - Decide whether the order can proceed.
            - Prepare a persistence-ready order payload when validation succeeds.
          branches:
            - condition: Order request is valid and can be persisted.
              next: 3
              outgoing: >
                  {
                    customer_id: string,
                    cart_id: string,
                    line_items: [
                      {
                        product_id: string,
                        quantity: integer
                      }
                    ],
                    pricing_summary: {
                      subtotal_amount: decimal,
                      currency: string
                    },
                    delivery_address: {
                      line_1: string,
                      line_2?: string,
                      city: string,
                      postcode: string,
                      country_code: string
                    },
                    order_status: pending_payment,
                    payment_method_token: string
                  }
            - condition: Order request is invalid and cannot proceed.
              next: 5
              outgoing: ref[order_rejection_response]
        - id: 3
          component: order_repository
          description:
            - Persist the order record.
            - Return the stored order state for downstream payment work.
          next: 4
          outgoing: ref[order_record]
        - id: 4
          component: payment_service
          description:
            - Create a payment attempt.
            - Send the authorization request to the payment provider.
            - Interpret the provider outcome and choose the correct response path.
          branches:
            - condition: Payment is authorized successfully.
              next: 5
              outgoing: ref[order_confirmation_response]
            - condition: Payment authorization fails.
              next: 5
              outgoing: ref[order_rejection_response]
        - id: 5
          component: order_response_mapper
          description:
            - Build the customer-facing outcome payload.
            - Return the final result to the storefront boundary.
