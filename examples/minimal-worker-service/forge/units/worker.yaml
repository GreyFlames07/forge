id: worker
name: Worker Runtime
description: Tiny Python worker runtime for smoke testing.
kind: worker
purpose: Process the bootstrap worker command path.
owned_by: forge.examples
entrypoint: apps/worker/src/main.py
serves_verticals:
- core
run:
  dev: python3 apps/worker/src/main.py --run-once
  test: python3 apps/worker/src/main.py --run-once
  prod: python3 apps/worker/src/main.py --run-once
env: []
depends_on:
  units: []
  stores:
  - main
  externals: []
healthcheck:
  kind: command
  target: python3 apps/worker/src/main.py --healthcheck
promotion:
  independently_promotable: true
  notes: Background bootstrap runtime for local smoke tests.
