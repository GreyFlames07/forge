<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forge Audit</title>
  <link rel="icon" href="./forge_white_small.drawio.svg" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-alt: #f6f8fa;
      --border: #d7dce3;
      --text: #1f2328;
      --muted: #59636e;
      --subtle: #818b98;
      --accent: #fd8c73;
      --hover: #f6f8fa;
      --active: #eaeef2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow-y: auto;
      overflow-x: hidden;
    }
    button {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .subnav {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 0 24px;
      height: 68px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      overflow-x: auto;
    }
    .subnav::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -10px;
      height: 8px;
      background: var(--bg);
      pointer-events: none;
    }
    .brand {
      display: flex;
      align-items: center;
      height: 100%;
      margin-right: 2px;
    }
    .brand-logo {
      width: 88px;
      height: 22px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: visible;
      transform: translateY(0);
    }
    .brand-logo img {
      display: block;
      width: auto;
      height: 100%;
      max-width: 100%;
      object-fit: contain;
      object-position: left center;
    }
    .brand-sep-v {
      width: 1px;
      height: 22px;
      background: var(--border);
      margin: 0 16px 0 12px;
    }
    .tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      height: 100%;
      white-space: nowrap;
    }
    .tab:hover {
      background: var(--hover);
    }
    .tab.active {
      font-weight: 600;
    }
    .tab.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 2px;
      background: var(--accent);
    }
    .main {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 32px;
      align-self: start;
    }
    .dashboard-shell {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      overflow: visible;
    }
    .toolbar {
      flex: 0 0 auto;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 56px;
      padding: 12px 16px;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      background: var(--panel-alt);
      font-size: 12px;
      color: var(--text);
      overflow-x: auto;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      color: var(--muted);
      white-space: nowrap;
    }
    .toolbar-btn:hover {
      background: var(--active);
    }
    .toolbar-btn.active {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .artifact {
      border: none;
      border-radius: 0;
      background: var(--bg);
      overflow: visible;
    }
    .section {
      display: none;
      padding: 28px 32px 32px;
      animation: fadeIn 180ms ease;
    }
    .section.active {
      display: block;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .grid.grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: start;
    }
    .grid.grid-1 {
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
    }
    .grid.grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .section-header {
      margin-bottom: 20px;
    }
    .section-eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--muted);
    }
    .section-title {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.2;
    }
    .section-description {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      max-width: 720px;
    }
    .section[id^="flow-"] > .section-header,
    .section[id^="container-"] > .section-header,
    .section[id^="entity-"] > .section-header,
    .section[id^="doc-"] > .section-header {
      display: none;
    }
    .horizontal-cards {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(240px, 1fr);
      gap: 16px;
      margin-top: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .vertical-cards {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      margin-top: 16px;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards {
      display: grid;
      gap: 0;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      overflow: hidden;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards::before {
      content: "Business Actions";
      display: block;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-alt);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card {
      display: grid;
      grid-template-columns: minmax(190px, 220px) minmax(0, 1fr) minmax(140px, auto);
      column-gap: 18px;
      align-items: center;
      margin: 0;
      padding: 11px 14px;
      border: 0;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      box-shadow: none;
      background: var(--bg);
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card:last-child {
      border-bottom: 0;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card h3,
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card p {
      margin: 0;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card h3 {
      font-size: 13px;
      line-height: 1.3;
      text-align: left;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: left;
    }
    #system-overview > [data-slot="system-body"] > .vertical-cards > .card .pill-list {
      justify-content: flex-end;
      margin: 0;
      justify-self: end;
    }
    .deployment-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 22px;
    }
    .deployment-stack .vertical-cards {
      margin-top: 0;
    }
    .runtime-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 22px 0 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-alt);
    }
    .runtime-controls h3,
    .runtime-controls p {
      margin: 0;
    }
    .runtime-controls p {
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.3;
    }
    .environment-select {
      min-width: 180px;
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }
    .container-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 22px;
    }
    .component-rows {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }
    .component-table {
      display: grid;
      gap: 0;
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg);
    }
    .component-table-row {
      display: grid;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid var(--border);
    }
    .component-table-row:first-child {
      border-top: none;
    }
    .component-expandable-row {
      padding: 0;
      overflow: hidden;
    }
    .component-row-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 18px;
      gap: 12px;
      align-items: center;
      padding: 8px 14px;
      cursor: pointer;
      list-style: none;
    }
    .component-row-head::-webkit-details-marker {
      display: none;
    }
    .component-row-head .kind-chip {
      align-self: center;
    }
    .component-row-head .entity-shape-chevron {
      grid-column: 3;
      align-self: center;
    }
    .component-row-body {
      display: grid;
      gap: 8px;
      padding: 0 14px 10px;
    }
    .operation-row-body {
      display: grid;
      gap: 10px;
      padding: 0 14px 12px;
    }
    .operation-row-body .metadata-table-wrap {
      margin-top: 0;
    }
    .operation-row-body .metadata-table th {
      width: 120px;
    }
    .operation-row-body .operation-io-table .metadata-table th,
    .operation-row-body .operation-io-table .metadata-table td {
      padding: 7px 12px;
      line-height: 1.25;
    }
    .operation-participation-table th:nth-child(3),
    .operation-participation-table td:nth-child(3) {
      width: 72px;
      white-space: nowrap;
    }
    .component-row-head h5 {
      margin: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }
    .component-source,
    .component-row-label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .component-table-row p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .component-responsibilities ul {
      margin: 4px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .component-responsibilities li + li {
      margin-top: 2px;
    }
    .data-shape-row {
      min-height: 40px;
      align-content: center;
      padding: 0;
    }
    .data-shape-row .component-row-head {
      align-items: center;
    }
    .data-shape-row .kind-chip {
      align-self: center;
    }
    .container-stack .grid {
      margin-bottom: 0;
    }
    #system-overview .system-summary-grid,
    #system-overview > [data-slot="system-body"] > .grid.grid-1:first-child {
      gap: 8px;
      margin-bottom: 10px;
    }
    #system-overview .system-summary-grid > .card,
    #system-overview > [data-slot="system-body"] > .grid.grid-1:first-child > .card {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 14px;
      align-items: baseline;
      padding: 9px 12px;
      border-radius: 8px;
    }
    #system-overview .system-summary-grid h3,
    #system-overview > [data-slot="system-body"] > .grid.grid-1:first-child > .card h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
    }
    #system-overview .system-summary-grid p,
    #system-overview > [data-slot="system-body"] > .grid.grid-1:first-child > .card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.3;
    }
    #system-overview .diagram-card:first-of-type .diagram-wrap {
      min-height: 170px;
      padding: 12px;
    }
    #system-overview .diagram-card:first-of-type .diagram-header {
      padding: 12px 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .card-defined {
      background: var(--panel);
    }
    .card-defined[data-target] {
      cursor: pointer;
    }
    .card-defined[data-target]:hover {
      background: var(--hover);
    }
    .card-defined[data-target]:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .card-muted {
      background: var(--panel-alt);
    }
    .deployment-node-card .card-header {
      align-items: center;
    }
    .deployment-node-card .pill-list {
      justify-content: flex-end;
    }
    .deployment-node-card .footer-note {
      margin-top: 10px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-header h3,
    .card-header h4 {
      margin-bottom: 0;
    }
    .card-header .pill-list {
      align-items: center;
      margin-top: 0;
    }
    .card h3, .card h4 {
      margin: 0 0 8px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .card-header h3,
    .card-header h4 {
      margin: 0;
    }
    .card h3 {
      font-size: 17px;
      line-height: 1.25;
    }
    .card h4 {
      font-size: 15px;
      line-height: 1.25;
    }
    .card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
    }
    .runtime-container-card {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
    }
    .runtime-container-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
    }
    .runtime-container-header h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }
    .runtime-container-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 520px;
    }
    .runtime-container-description {
      max-width: 760px;
      font-size: 13px;
      line-height: 1.35;
    }
    .runtime-component-dropdown {
      max-width: 760px;
    }
    .runtime-component-dropdown summary {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
    }
    .runtime-component-dropdown ul {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
      columns: 2;
    }
    .runtime-component-dropdown li {
      break-inside: avoid;
      margin-bottom: 4px;
    }
    .runtime-deployment-panel {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(280px, 1.4fr);
      gap: 14px;
      align-items: start;
      max-width: 920px;
      margin-top: 2px;
      padding: 10px 0 0 12px;
      border-top: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      background: transparent;
    }
    .runtime-deployment-panel[hidden] {
      display: none;
    }
    .runtime-deployment-label {
      margin-bottom: 3px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }
    .runtime-deployment-copy p {
      max-width: 420px;
      margin: 0;
      font-size: 13px;
      line-height: 1.32;
    }
    .runtime-deployment-fields {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px 14px;
      min-width: 0;
    }
    .runtime-deployment-fields div {
      min-width: 0;
    }
    .runtime-deployment-fields span,
    .runtime-deployment-fields strong {
      display: block;
    }
    .runtime-deployment-fields span {
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .runtime-deployment-fields strong {
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.28;
    }
    .runtime-deployment-endpoint {
      grid-column: 1 / -1;
    }
    .record-list {
      display: grid;
      gap: 12px;
    }
    .record-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px 16px;
      align-items: start;
      width: 100%;
      text-align: left;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
    }
    .record-row:hover {
      background: var(--hover);
    }
    .record-main {
      display: contents;
    }
    .record-main h3 {
      grid-column: 1;
      grid-row: 1;
      margin: 0;
    }
    .record-main p {
      grid-column: 1 / -1;
      grid-row: 2;
      margin: 0;
      font-size: 13px;
      max-width: none;
    }
    .record-side {
      display: grid;
      grid-column: 2;
      grid-row: 1;
      gap: 8px;
      justify-items: end;
      min-width: 140px;
    }
    .record-meta {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      overflow-wrap: anywhere;
    }
    .kind-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      line-height: 1.1;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      white-space: nowrap;
    }
    .chip-early {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .chip-shape {
      background: #fef3c7;
      border-color: #fcd34d;
      color: #92400e;
    }
    .chip-persistent {
      background: #ecfdf5;
      border-color: #86efac;
      color: #166534;
    }
    .chip-deploy {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #3730a3;
    }
    .chip-storage {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #334155;
    }
    .chip-table {
      background: #f5f3ff;
      border-color: #ddd6fe;
      color: #5b21b6;
    }
    .chip-lifecycle {
      background: #f0fdfa;
      border-color: #5eead4;
      color: #0f766e;
    }
    .chip-boundary {
      background: #fff7ed;
      border-color: #fdba74;
      color: #9a3412;
    }
    .schema-viewer {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fbfcfe;
      overflow: auto;
    }
    .schema-viewer pre {
      margin: 0;
      padding: 16px;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text);
      white-space: pre;
    }
    .metadata-table-wrap {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg);
    }
    .data-entry-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 22px;
      margin-top: 22px;
    }
    .entity-detail-stack {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }
    .entity-summary-card > .card-header {
      min-height: 28px;
    }
    .entity-state-diagram {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-alt);
    }
    .entity-state-diagram-flat {
      display: flex;
      flex-wrap: wrap;
    }
    .entity-state-transition {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .entity-state-node {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 12px;
      border: 1px solid #5eead4;
      border-radius: 999px;
      background: #f0fdfa;
      color: #0f766e;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .entity-state-arrow {
      position: relative;
      min-width: 36px;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }
    .lifecycle-transition-details .metadata-table-wrap {
      margin-top: 0;
      border: 0;
      border-radius: 0;
    }
    .lifecycle-transition-table {
      table-layout: fixed;
    }
    .lifecycle-transition-table .lifecycle-col-state {
      width: 16%;
    }
    .lifecycle-transition-table .lifecycle-col-condition {
      width: 68%;
    }
    .lifecycle-transition-table th:first-child,
    .lifecycle-transition-table th:nth-child(2),
    .lifecycle-transition-table td:first-child,
    .lifecycle-transition-table td:nth-child(2) {
      width: 16%;
      white-space: nowrap;
    }
    .lifecycle-transition-table th:nth-child(3),

<body>
  <nav class="subnav">
    <div class="brand">
      <div class="brand-logo">

  </nav>
  <main class="main">
    <div class="dashboard-shell">
      <div class="toolbar">
        __DYNAMIC_ITEM_BUTTONS_HTML__
      </div>
      <div class="artifact">
        <section class="section" id="system-overview" data-group="System">
          <div data-slot="system-body">__SYSTEM_BODY__</div>
        </section>
        <section class="section" id="runtime-overview" data-group="Runtime">
          <div data-slot="runtime-body">__RUNTIME_BODY__</div>
        </section>
        <section class="section" id="data-overview" data-group="Data">
          <div class="section-header">
            <p class="section-eyebrow">__SYSTEM_ID__ / Data</p>
