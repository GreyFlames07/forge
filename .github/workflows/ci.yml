name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Create venv + install package
        run: |
          uv venv --python 3.13 .venv
          uv pip install -e . pytest

      - name: Run test suite
        run: .venv/bin/pytest -v
