schema: forge.v2.runtime

runtime:
  containers:
    - id: storefront_web
      description: Customer-facing web application for browsing products and placing orders.
      kind: client_side_web_application
      technology: Next.js
      responsibilities:
        - Render product discovery and checkout experiences.
        - Collect cart and checkout input.
        - Send order requests to the ordering backend.
      security: >
        Must only communicate with backend services over HTTPS and must never
        store raw payment credentials in browser-accessible storage.
    - id: ordering_api
      description: Backend application that validates orders, persists state, and coordinates payment.
      kind: server_side_web_application
      technology: FastAPI
      responsibilities:
        - Validate incoming order requests.
        - Persist order and payment attempt records.
        - Call the payment provider and return customer-facing outcomes.
      security: >
        Must protect operational endpoints with authentication and authorization,
        redact sensitive values from logs, and keep provider secrets outside
        request and response payloads.
    - id: orders_db
      description: Primary database for order and payment attempt state.
      kind: database
      technology: PostgreSQL
      responsibilities:
        - Store order records.
        - Store payment attempt records.
        - Support reads and writes required by ordering workflows.
      security: >
        Must only accept connections from approved application clients and must
        protect persisted customer and payment-related state at rest.
    - id: payment_gateway
      description: External payment processor API used to authorize card payments.
      kind: external_container
      technology: Stripe API
      responsibilities:
        - Authorize payment attempts.
        - Return payment success or failure outcomes.
      security: >
        Must be called only over secure transport using provider-managed
        credentials and in accordance with provider secret-handling rules.
  relationships:
    - from: storefront_web
      to: ordering_api
      description: Sends checkout requests and receives order outcomes over HTTPS JSON APIs.
    - from: ordering_api
      to: orders_db
      description: Writes and reads order and payment attempt state using SQL.
    - from: ordering_api
      to: payment_gateway
      description: Sends payment authorization requests over HTTPS.
