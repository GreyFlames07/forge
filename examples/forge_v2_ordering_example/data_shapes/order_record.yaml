schema: forge.v2.data_shape

data_shapes:
  - id: order_record
    description: Persisted order shape stored after checkout is accepted for processing.
    kind: state
    shape:
      order_id: string
      customer_id: string
      cart_id: string
      line_items:
        - product_id: string
          quantity: integer @min(1)
      pricing_summary:
        subtotal_amount: decimal
        currency: string
      delivery_address:
        line_1: string
        line_2?: string
        city: string
        postcode: string
        country_code: string @enum[AU, NZ, US]
      order_status: enum[pending_payment, confirmed, fulfilled, cancelled, failed]
      created_at: datetime
      updated_at: datetime
