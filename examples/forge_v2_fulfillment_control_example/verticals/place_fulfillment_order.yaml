schema: forge.v2.vertical

verticals:
  - id: place_fulfillment_order
    description: End-to-end implementation slice for order intake, fraud checks, inventory reservation, and shipment booking.
    user_value: Customers can place an order and immediately see whether it is confirmed, delayed for shortage recovery, or rejected.
    high_level_flows:
      - place_fulfillment_order
    runtime_containers:
      - customer_portal
      - orchestration_api
      - fulfillment_db
      - fraud_gateway
      - carrier_gateway
      - notification_gateway
    data_shapes:
      - fulfillment_order_record
      - inventory_reservation_record
      - shipment_plan_record
      - shortage_case_record
      - fulfillment_confirmation_response
      - fulfillment_rejection_response
      - shortage_resolution_response
    persistent_shapes:
      - fulfillment_order
      - inventory_reservation
      - shipment_plan
      - shortage_case
    deployment_notes: >
      Requires the customer portal, orchestration API, primary relational data
      store, fraud provider, carrier provider, and notification provider to be
      available in the target environment.
    build_notes: >
      Build this vertical by first accepting the customer request, then add
      fraud screening, then persist order and reservation state, then add
      carrier booking, and finally expose the confirmed, shortage, and rejected
      customer outcomes.
