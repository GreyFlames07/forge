schema_version: forge.v2
system:
  id: minimal_cli
  name: Minimal CLI
  project_profile: cli-tool
  description: A tiny CLI project used to smoke-test Forge V2 behavior.
  purpose: Demonstrate a runnable CLI bootstrap command with explicit contracts.
  goals:
  - Expose a status command through a canonical operation.
  - Expand to a second report command as a non-bootstrap slice.
  invariants:
  - The bootstrap command must keep working throughout the build.
  auth_contexts:
  - id: anonymous
    description: Unauthenticated caller
  security:
    posture:
    - This example exposes read-only commands only.
    data_handling:
    - No sensitive data is returned.
  environments:
  - id: dev
    description: Local development
  - id: prod
    description: Production deployment
  promotion_stages:
  - dev
  - prod
