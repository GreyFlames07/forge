name: Publish

on:
  push:
    branches: [main]
    paths:
      - pyproject.toml
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify push changed package version
        if: github.event_name == 'push'
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import tomllib

          before = "${{ github.event.before }}"
          current = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          previous_text = subprocess.check_output(["git", "show", f"{before}:pyproject.toml"], text=True)
          previous = tomllib.loads(previous_text)["project"]["version"]
          if current == previous:
              raise SystemExit(f"Package version did not change: {current}")
          print(f"Publishing ai-forge-cli {previous} -> {current}")
          PY

      - name: Verify release matches package version
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          release_tag = "${{ github.event.release.tag_name }}"
          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          expected = f"v{version}"
          if release_tag != expected:
              raise SystemExit(f"Release tag/version mismatch: tag={release_tag}, package={expected}")
          PY

      - name: Build distributions
        run: |
          rm -rf build dist
          find src/cli/resources/skills -type d -name '__pycache__' -prune -exec rm -rf {} +
          find src/cli/resources/skills -type f \( -name '*.pyc' -o -name '*.pyo' \) -delete
          python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/forge-release-venv
          /tmp/forge-release-venv/bin/python -m ensurepip --upgrade >/dev/null
          /tmp/forge-release-venv/bin/python -m pip install dist/*.whl
          /tmp/forge-release-venv/bin/forge --help >/dev/null

      - name: Smoke test init onboarding
        run: |
          tmpdir="$(mktemp -d)"
          /tmp/forge-release-venv/bin/forge init --root "$tmpdir" --name "Release Project" --id release_project --no-animation >/tmp/forge-release-init.log
          test -f "$tmpdir/business-plan.md"
          test -f "$tmpdir/forge/USING_FORGE.md"
          test -f "$tmpdir/forge/SCHEMA_REFERENCE_V4.md"
          test -f "$tmpdir/forge/FRAMEWORK_V4.md"
          test -f "$tmpdir/forge/decisions.yaml"
          test ! -f "$tmpdir/forge/SCHEMA_REFERENCE_V3.md"
          test ! -f "$tmpdir/forge/FRAMEWORK_V3.md"
          test -f "$tmpdir/forge/skills/forge-business/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-schema/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-security/SKILL.md"
          test -f "$tmpdir/forge/skills/forge-hydrate/SKILL.md"
          test -L "$tmpdir/.codex/skills/forge-build"
          test -L "$tmpdir/.claude/skills/forge-schema"
          test -L "$tmpdir/.agents/skills/forge-review"
          test -L "$tmpdir/.copilot/skills/forge-security"
          test -f "$tmpdir/.github/copilot-instructions.md"
          test -f "$tmpdir/.github/instructions/forge.instructions.md"
          test -L "$tmpdir/.github/prompts/forge-build.prompt.md"
          grep -q "Start With Skills" "$tmpdir/forge/USING_FORGE.md"

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
