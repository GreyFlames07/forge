schema: forge.v2.container

container:
  id: orchestration_api
  description: >
    Internal component structure for the orchestration API, showing how
    fulfillment, shortage, and return requests are validated, persisted,
    coordinated with providers, and turned into user-visible outcomes.
  components:
    - id: fulfillment_request_controller
      description: Entry component for customer and staff requests entering the orchestration boundary.
      responsibilities:
        - Accept fulfillment, shortage, and return API requests.
        - Enforce request-shape validation and routing.
    - id: policy_decision_service
      description: Validates business rules for fraud, allocation readiness, and return eligibility.
      responsibilities:
        - Evaluate whether requests can proceed.
        - Normalize decisions for downstream orchestration steps.
    - id: fulfillment_repository
      description: Persists and retrieves operational state for orders, reservations, shortages, shipments, and returns.
      responsibilities:
        - Write and update fulfillment records.
        - Read current state needed for orchestration decisions.
    - id: provider_gateway_service
      description: Builds outbound requests for fraud, carrier, notification, and worker dispatch interactions.
      responsibilities:
        - Prepare provider-specific payloads.
        - Interpret external outcomes into internal contracts.
    - id: response_mapper
      description: Builds customer-facing and operator-facing response payloads.
      responsibilities:
        - Construct fulfillment, shortage, and return responses.
        - Keep external responses aligned with internal state outcomes.
  component_flows:
    - id: place_fulfillment_order_internal
      runtime_flow: place_fulfillment_order_runtime
      description: >
        Realizes the orchestration_api portion of the order intake and shipment
        booking flow.
      trigger: >
        {
          customer_id: string,
          sales_channel: string @enum[web, mobile],
          line_items: [
            {
              sku: string,
              quantity: integer @min(1)
            }
          ],
          delivery_address: {
            line_1: string,
            line_2?: string,
            city: string,
            postcode: string,
            country_code: string @enum[AU, NZ, US]
          },
          payment_reference: string
        }
      steps:
        - id: 1
          component: fulfillment_request_controller
          description:
            - Accept the customer fulfillment request.
            - Validate request shape and normalize the inbound payload.
            - Route the request into policy evaluation.
          next: 2
          outgoing: >
            {
              customer_id: string,
              sales_channel: string @enum[web, mobile],
              line_items: [
                {
                  sku: string,
                  quantity: integer @min(1)
                }
              ],
              delivery_address: {
                line_1: string,
                line_2?: string,
                city: string,
                postcode: string,
                country_code: string @enum[AU, NZ, US]
              },
              payment_reference: string
            }
        - id: 2
          component: policy_decision_service
          description:
            - Validate business rules for order intake.
            - Prepare the minimal fraud decision request.
            - Decide whether the request can continue after fraud screening.
          branches:
            - condition: Fraud screening approves the request.
              next: 3
              outgoing: >
                {
                  decision: enum[approved],
                  line_items: [
                    {
                      sku: string,
                      quantity: integer @min(1)
                    }
                  ],
                  delivery_address: {
                    city: string,
                    postcode: string,
                    country_code: string @enum[AU, NZ, US]
                  }
                }
            - condition: Fraud screening rejects or diverts the request.
              next: 5
              outgoing: ref[fulfillment_rejection_response]
        - id: 3
          component: fulfillment_repository
          description:
            - Create the fulfillment order and reservation records.
            - Detect whether inventory is fully available, partially available, or unavailable.
            - Return either a booking-ready payload or a shortage case.
          branches:
            - condition: Inventory is reserved and booking can proceed.
              next: 4
              outgoing: >
                {
                  order_id: string,
                  shipment_mode: enum[standard, express],
                  packages: [
                    {
                      package_id: string,
                      weight_kg: decimal
                    }
                  ],
                  destination: {
                    city: string,
                    postcode: string,
                    country_code: string @enum[AU, NZ, US]
                  }
                }
            - condition: Inventory cannot be committed cleanly.
              next: 5
              outgoing: ref[shortage_case_record]
        - id: 4
          component: provider_gateway_service
          description:
            - Send the carrier booking request.
            - Persist the shipment plan or shortage fallback state.
            - Build a mapped success or shortage payload.
          branches:
            - condition: Carrier booking succeeds.
              next: 5
              outgoing: ref[fulfillment_confirmation_response]
            - condition: Carrier booking fails and a shortage case is opened.
              next: 5
              outgoing: ref[shortage_resolution_response]
        - id: 5
          component: response_mapper
          description:
            - Build the final customer-facing response for success, shortage, or rejection.
            - Return the outcome to the customer boundary.
    - id: recover_inventory_shortage_internal
      runtime_flow: recover_inventory_shortage_runtime
      description: >
        Realizes the orchestration_api portion of staff-driven shortage recovery.
      trigger: >
        {
          shortage_case_id: string,
          operator_id: string,
          selected_resolution: enum[reroute_inventory, partial_ship, cancel_order],
          resolution_notes?: string
        }
      steps:
        - id: 1
          component: fulfillment_request_controller
          description:
            - Accept the staff recovery request.
            - Validate staff identity, case id, and selected resolution.
            - Forward the normalized decision to the policy layer.
          next: 2
          outgoing: >
            {
              shortage_case_id: string,
              operator_id: string,
              selected_resolution: enum[reroute_inventory, partial_ship, cancel_order],
              resolution_notes?: string
            }
        - id: 2
          component: policy_decision_service
          description:
            - Verify the requested resolution is allowed for the current case state.
            - Prepare the background work payload.
            - Decide whether the case can move to in progress.
          next: 3
          outgoing: >
            {
              shortage_case_id: string,
              order_id: string,
              operator_id: string,
              selected_resolution: enum[reroute_inventory, partial_ship, cancel_order]
            }
        - id: 3
          component: fulfillment_repository
          description:
            - Persist the in-progress shortage state.
            - Record the operator action in auditable operational history.
            - Return the worker-dispatch payload.
          next: 4
          outgoing: >
            {
              shortage_case_id: string,
              order_id: string,
              operator_id: string,
              selected_resolution: enum[reroute_inventory, partial_ship, cancel_order]
            }
        - id: 4
          component: provider_gateway_service
          description:
            - Dispatch the background recovery work.
            - Prepare the immediate operator-facing acknowledgement.
          next: 5
          outgoing: ref[shortage_resolution_response]
        - id: 5
          component: response_mapper
          description:
            - Build the operator-facing response confirming the recovery path is underway.
            - Return the acknowledgement to the operations console.
    - id: process_return_and_refund_internal
      runtime_flow: process_return_and_refund_runtime
      description: >
        Realizes the orchestration_api portion of customer return and refund handling.
      trigger: >
        {
          order_id: string,
          customer_id: string,
          return_items: [
            {
              sku: string,
              quantity: integer @min(1),
              return_reason: string
            }
          ],
          requested_resolution: enum[refund, exchange, store_credit]
        }
      steps:
        - id: 1
          component: fulfillment_request_controller
          description:
            - Accept the return request from the customer portal.
            - Validate request shape and customer ownership.
            - Pass the request into return policy evaluation.
          next: 2
          outgoing: >
            {
              order_id: string,
              customer_id: string,
              return_items: [
                {
                  sku: string,
                  quantity: integer @min(1),
                  return_reason: string
                }
              ],
              requested_resolution: enum[refund, exchange, store_credit]
            }
        - id: 2
          component: policy_decision_service
          description:
            - Validate delivery and return-policy eligibility.
            - Decide whether the return can proceed.
            - Prepare the persisted return record when approved.
          branches:
            - condition: Return is eligible.
              next: 3
              outgoing: ref[return_request_record]
            - condition: Return is denied.
              next: 5
              outgoing: ref[return_status_response]
        - id: 3
          component: fulfillment_repository
          description:
            - Persist the approved return request.
            - Update linked order state for return visibility.
            - Return the dispatch and notification payload.
          next: 4
          outgoing: ref[return_request_record]
        - id: 4
          component: provider_gateway_service
          description:
            - Generate return instructions and notification work.
            - Dispatch refund-completion background work for later execution.
          next: 5
          outgoing: ref[return_status_response]
        - id: 5
          component: response_mapper
          description:
            - Build the final approved or denied customer-facing return response.
            - Return the outcome to the customer portal boundary.
