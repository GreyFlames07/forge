schema: forge.v2.vertical

verticals:
  - id: process_return_and_refund
    description: End-to-end implementation slice for customer returns, policy decisions, and refund completion.
    user_value: Customers can request returns, receive a clear eligibility decision, and track refund completion.
    high_level_flows:
      - process_return_and_refund
    runtime_containers:
      - customer_portal
      - orchestration_api
      - orchestration_worker
      - fulfillment_db
      - payments_gateway
      - notification_gateway
    data_shapes:
      - return_request_record
      - return_status_response
      - fulfillment_order_record
    persistent_shapes:
      - return_request
      - fulfillment_order
      - shipment_plan
    deployment_notes: >
      Requires the customer portal, orchestration API, background worker,
      fulfillment data store, payment gateway, and notification provider to be
      reachable in the target environment.
    build_notes: >
      Build this vertical by first validating return eligibility, then persist
      the return request, then expose customer-visible instructions, and
      finally add background refund completion with failure follow-up.
