          </div>
          <div data-slot="data-body">__DATA_BODY__</div>
        </section>
        <section class="section" id="verticals-overview" data-group="Verticals">
          <div data-slot="verticals-body">__VERTICALS_BODY__</div>
        </section>
        __DYNAMIC_SECTIONS_HTML__
      </div>
    </div>
  </main>
  <footer class="footer">
    <span>© Forge</span>
    <span data-fallback="forge_project">__SYSTEM_ID__</span>
  </footer>
  <script id="audit-data" type="application/json">__AUDIT_DATA__</script>
  <script>
    function fillTemplateFallbacks() {
      document.querySelectorAll('[data-fallback]').forEach(element => {
        if (element.textContent.includes('__')) {
          element.textContent = element.dataset.fallback;
        }
      });
      document.querySelectorAll('[data-slot]').forEach(slot => {
        if (slot.textContent.trim().startsWith('__')) {
          slot.innerHTML = '<div class="card"><h3>Schema Content</h3><p>This framework section is part of the static audit template. Forge will inject the schema-specific content here when the artifact is rendered.</p></div>';
        }
      });
      const placeholderNodes = Array.from(document.querySelectorAll('.toolbar, .artifact'))
        .flatMap(node => Array.from(node.childNodes))
        .filter(node => node.nodeType === Node.TEXT_NODE && node.textContent.trim().startsWith('__'));
      placeholderNodes.forEach(node => node.textContent = '');
    }

    function readAuditData() {
      const el = document.getElementById('audit-data');
      if (!el) return {};
      try {
        return JSON.parse(el.textContent);
      } catch {
        return {};
      }
    }

    fillTemplateFallbacks();
    const AUDIT_DATA = readAuditData();
    const GRAPH_TARGETS = AUDIT_DATA.graph_targets || {};
    const sections = Array.from(document.querySelectorAll('.section'));
    const itemButtons = Array.from(document.querySelectorAll('.toolbar-btn'));
    const tabs = Array.from(document.querySelectorAll('.tab'));
    const GROUP_OVERVIEW_TARGETS = {
      System: 'system-overview',
      Runtime: 'runtime-overview',
      Data: 'data-overview',
      Verticals: 'verticals-overview',
    };

    function setActiveGroup(group, activeSectionId = '') {
      const isOverviewSection = activeSectionId.endsWith('-overview');
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.group === group));
      itemButtons.forEach(button => {
        const isVisible = button.dataset.group === group && !isOverviewSection;
        button.style.display = isVisible ? 'inline-flex' : 'none';
      });
    }

    function getSvgNaturalSize(svg) {
      const viewBox = svg.viewBox && svg.viewBox.baseVal;
      if (viewBox && viewBox.width && viewBox.height) {
        return { width: viewBox.width, height: viewBox.height };
      }
      const width = parseFloat(svg.getAttribute('width')) || svg.getBoundingClientRect().width || 1;
      const height = parseFloat(svg.getAttribute('height')) || svg.getBoundingClientRect().height || 1;
      return { width, height };
    }

    function normalizeSvgBounds(surfaceNode) {
      const svg = surfaceNode.querySelector('svg');
      if (!svg) return;
      const measureSelectors = ['g', 'path', 'line', 'polyline', 'rect', 'ellipse', 'circle', 'text'];
      const candidates = measureSelectors
        .flatMap(selector => Array.from(svg.querySelectorAll(selector)))
        .filter(element => typeof element.getBBox === 'function');
      if (!candidates.length) return;

      const bounds = candidates
        .map(element => {
          try {
            return element.getBBox();
          } catch {
            return null;
          }
        })
        .filter(Boolean);
      if (!bounds.length) return;

      const padding = 24;
      const minX = Math.min(...bounds.map(box => box.x)) - padding;
      const minY = Math.min(...bounds.map(box => box.y)) - padding;
      const maxX = Math.max(...bounds.map(box => box.x + box.width)) + padding;
      const maxY = Math.max(...bounds.map(box => box.y + box.height)) + padding;
      const width = Math.max(1, maxX - minX);
      const height = Math.max(1, maxY - minY);

      svg.setAttribute('viewBox', `${minX} ${minY} ${width} ${height}`);
      svg.setAttribute('width', `${width}`);
      svg.setAttribute('height', `${height}`);
      svg.style.maxWidth = 'none';
      svg.style.overflow = 'visible';
      surfaceNode._naturalSize = { width, height };
    }

    function applyDiagramScale(surfaceNode, scale) {
      const svg = surfaceNode.querySelector('svg');
      if (!svg) return;
      const natural = surfaceNode._naturalSize || getSvgNaturalSize(svg);
      const wrap = surfaceNode.closest('.diagram-wrap');
      surfaceNode._naturalSize = natural;
      surfaceNode.dataset.scale = scale.toFixed(2);
      const compact = Boolean(surfaceNode.closest('.diagram-card-compact'));
      const flowDiagram = Boolean(surfaceNode.closest('.section[id^="flow-"]'));
      const systemDiagram = Boolean(surfaceNode.closest('#system-overview'));
      if (compact) {
        svg.style.width = `${natural.width * scale}px`;
        svg.style.height = `${natural.height * scale}px`;
        svg.style.transform = 'none';
        svg.style.transformOrigin = 'center center';
      } else {
        svg.style.width = `${natural.width}px`;
        svg.style.height = `${natural.height}px`;
        svg.style.transform = `scale(${scale})`;
        svg.style.transformOrigin = 'top left';
      }
      surfaceNode.style.width = `${natural.width * scale}px`;
      surfaceNode.style.height = `${natural.height * scale}px`;
      if (wrap && !wrap.dataset.fixedHeight) {
        const compactMinimum = compact ? 128 : (flowDiagram ? 168 : (systemDiagram ? 170 : 240));
        const verticalPadding = compact || flowDiagram || systemDiagram ? 24 : 36;
        wrap.style.height = `${Math.max(compactMinimum, Math.ceil(natural.height * scale + verticalPadding))}px`;
        wrap.dataset.fixedHeight = 'true';
      }
      centerCompactDiagram(surfaceNode);
    }

    function centerCompactDiagram(surfaceNode) {
      if (!surfaceNode.closest('.diagram-card-compact')) return;
      const wrap = surfaceNode.closest('.diagram-wrap');
      const svg = surfaceNode.querySelector('svg');
      if (!wrap || !svg) return;
      surfaceNode.style.transform = '';
      const nodes = Array.from(svg.querySelectorAll('g.node'));
      if (!nodes.length) return;
      const bounds = nodes.reduce((acc, node) => {
        const rect = node.getBoundingClientRect();
        return {
          left: Math.min(acc.left, rect.left),
          right: Math.max(acc.right, rect.right),
        };
      }, { left: Infinity, right: -Infinity });
      if (!Number.isFinite(bounds.left) || !Number.isFinite(bounds.right)) return;
      const wrapRect = wrap.getBoundingClientRect();
      const nodeCenter = (bounds.left + bounds.right) / 2;
      const wrapCenter = wrapRect.left + wrapRect.width / 2;
      const offset = wrapCenter - nodeCenter;
      surfaceNode.style.transform = `translateX(${offset.toFixed(1)}px)`;
    }

    function getInitialDiagramScale(surfaceNode) {
      const wrap = surfaceNode.closest('.diagram-wrap');
      const natural = surfaceNode._naturalSize;
      if (!wrap || !natural || !natural.width) return 1;
      const available = Math.max(320, wrap.clientWidth - 12);
      const systemDiagram = Boolean(surfaceNode.closest('#system-overview'));
      const maxScale = systemDiagram ? 0.72 : 1;
      return Math.max(0.55, Math.min(maxScale, available / natural.width));
    }

    function normalizeSystemContextGraph(container) {
      const title = container.closest('.diagram-card')?.querySelector('.diagram-header h3')?.textContent.trim();
      if (title !== 'System Context') return;
      const svg = container.querySelector('svg');
      if (!svg) return;

      svg.querySelectorAll('.edgeLabel, g.label, foreignObject').forEach(node => {
        if (node.textContent && node.textContent.trim() === 'interacts') {
          node.remove();
        }
      });

      const actorLabels = new Set(['visitor', 'team_member']);
      const actorShapes = Array.from(svg.querySelectorAll('g.node')).flatMap(node => {
        const label = node.querySelector('.nodeLabel, span, p, text')?.textContent.trim();
        if (!actorLabels.has(label)) return [];
        const shape = node.querySelector('ellipse, circle');
        return shape ? [shape] : [];
      });
      if (actorShapes.length < 2) return;

      const maxRx = Math.max(...actorShapes.map(shape => Number(shape.getAttribute('rx') || shape.getAttribute('r') || 0)));
      const maxRy = Math.max(...actorShapes.map(shape => Number(shape.getAttribute('ry') || shape.getAttribute('r') || 0)));
      const maxWidth = Math.max(...actorShapes.map(shape => Number(shape.getAttribute('width') || 0)));
      const maxHeight = Math.max(...actorShapes.map(shape => Number(shape.getAttribute('height') || 0)));
      actorShapes.forEach(shape => {
        if (maxWidth) shape.setAttribute('width', String(maxWidth));
        if (maxHeight) shape.setAttribute('height', String(maxHeight));
        if (shape.tagName.toLowerCase() === 'circle') {
          shape.setAttribute('r', String(Math.max(maxRx, maxRy, maxWidth / 2, maxHeight / 2)));
        } else {
          shape.setAttribute('rx', String(maxRx || maxWidth / 2));
          shape.setAttribute('ry', String(maxRy || maxHeight / 2));
        }
      });
    }

    function wrapLabelText(label, maxChars = 20) {
      const words = String(label).trim().split(/\s+/).filter(Boolean);
      if (!words.length) return [];
      const lines = [];
      let current = words[0];
      for (const word of words.slice(1)) {
        if ((current + ' ' + word).length <= maxChars) {
          current += ' ' + word;
        } else {
          lines.push(current);
          current = word;
        }
      }
      lines.push(current);
      return lines;
    }

    function wrapNodeLines(label, maxChars = 18) {
      return wrapLabelText(label, maxChars);
    }

    function drawRoundedRect(svgNs, attributes) {
      const rect = document.createElementNS(svgNs, 'rect');
      Object.entries(attributes).forEach(([key, value]) => rect.setAttribute(key, String(value)));
      return rect;
    }

    function drawEllipse(svgNs, attributes) {
      const ellipse = document.createElementNS(svgNs, 'ellipse');
      Object.entries(attributes).forEach(([key, value]) => ellipse.setAttribute(key, String(value)));
      return ellipse;
    }

    function drawDeploymentShape(svgNs, group, forge, node) {
      const width = Number(node.width || 0);
      const height = Number(node.height || 0);
      const kind = String(forge.kind || '');

      if (kind === 'deploy-browser') {
        const frame = drawRoundedRect(svgNs, {
          class: 'browser-frame',
          x: 0,
          y: 0,
          width,
          height,
          rx: 10,
        });
        const bar = drawRoundedRect(svgNs, {
          class: 'browser-bar',
          x: 0,
          y: 0,
          width,
          height: 22,
          rx: 10,
        });
        group.appendChild(frame);
        group.appendChild(bar);
        [16, 28, 40].forEach((cx) => {
          const dot = drawEllipse(svgNs, {
            class: 'browser-dot',
            cx,
            cy: 11,
            rx: 2.4,
            ry: 2.4,
          });
          group.appendChild(dot);
        });
        return;
      }

      if (kind === 'deploy-database') {
        const bodyTop = 18;
        const bodyBottom = height - 16;
        const radiusX = Math.max(36, (width / 2) - 18);
        const centerX = width / 2;
        const body = drawRoundedRect(svgNs, {
          class: 'db-body',
          x: 16,
          y: bodyTop,
          width: width - 32,
          height: bodyBottom - bodyTop,
          rx: 0,
        });
        const top = drawEllipse(svgNs, {
          class: 'db-top',
          cx: centerX,
          cy: bodyTop,
          rx: radiusX,
          ry: 10,
        });
        const bottom = drawEllipse(svgNs, {
          class: 'db-bottom',
          cx: centerX,
          cy: bodyBottom,
          rx: radiusX,
          ry: 10,
        });
        group.appendChild(body);
        group.appendChild(top);
        group.appendChild(bottom);
        return;
      }

      if (kind === 'deploy-external') {
        const panel = drawRoundedRect(svgNs, {
          class: 'external-panel',
          x: 0,
          y: 0,
          width,
          height,
          rx: 10,
        });
        group.appendChild(panel);
        return;
      }

      if (kind === 'deploy-edge') {
        const panel = drawRoundedRect(svgNs, {
          class: 'edge-panel',
          x: 0,
          y: 0,
          width,
          height,
          rx: 10,
        });
        const badge = drawRoundedRect(svgNs, {
          class: 'edge-badge',
          x: 12,
          y: 12,
          width: 36,
          height: 26,
          rx: 7,
        });
        group.appendChild(panel);
        group.appendChild(badge);
        return;
      }

      if (kind === 'deploy-service') {
        const panel = drawRoundedRect(svgNs, {
          class: 'service-panel',
          x: 0,
          y: 0,
          width,
          height,
          rx: 10,
        });
        const terminal = drawRoundedRect(svgNs, {
          class: 'service-terminal',
          x: 12,
          y: 12,
          width: 34,
          height: 22,
          rx: 5,
        });
        group.appendChild(panel);
        group.appendChild(terminal);
        return;
      }
    }

    function deploymentTextLayout(kind, node) {
      const width = Number(node.width || 0);
      const height = Number(node.height || 0);
      if (kind === 'deploy-database') {
        const bodyTop = 18;
        const bodyBottom = height - 16;
        const bodyCenterY = bodyTop + ((bodyBottom - bodyTop) / 2);
        return {
          labelX: width / 2,
          labelY: bodyCenterY - 10,
          labelMaxChars: 16,
          subtitleX: width / 2,
          subtitleY: bodyCenterY + 14,
          subtitleMaxChars: 20,
        };
      }
      if (kind === 'deploy-browser') {
        return {
          labelX: width / 2,
          labelY: 38,
          labelMaxChars: 18,
          subtitleX: width / 2,
          subtitleY: 58,
          subtitleMaxChars: 20,
        };
      }
      if (kind === 'deploy-edge' || kind === 'deploy-service' || kind === 'deploy-external') {
        return {
          labelX: width / 2,
          labelY: 40,
          labelMaxChars: 18,
          subtitleX: width / 2,
          subtitleY: 60,
          subtitleMaxChars: 22,
        };
      }
      return {
        labelX: width / 2,
        labelY: (height / 2) - 2,
        labelMaxChars: 18,
        subtitleX: width / 2,
        subtitleY: (height / 2) + 18,
        subtitleMaxChars: 20,
      };
    }

    function nodeTextLayout(kind, node) {
      const width = Number(node.width || 0);
      const height = Number(node.height || 0);
      if (kind === 'actor' || kind === 'dependency' || kind === 'state-node') {
        return {
          labelX: width / 2,
          labelY: (height / 2) - 8,
          labelMaxChars: 16,
          subtitleX: width / 2,
          subtitleY: (height / 2) + 14,
          subtitleMaxChars: 18,
          centered: true,
        };
      }
      return {
        labelX: width / 2,
        labelY: (height / 2) - 10,
        labelMaxChars: 18,
        subtitleX: width / 2,
        subtitleY: height - 16,
        subtitleMaxChars: 20,
        centered: false,
      };
    }

    function centeredTextStartY(totalLines, lineHeight, centerY, baselineOffset = 0) {
      const totalHeight = Math.max(0, (totalLines - 1) * lineHeight);
      return centerY - (totalHeight / 2) + baselineOffset;
    }

    function labelAnchorPoint(section) {
      const points = [section.startPoint, ...(section.bendPoints || []), section.endPoint];
      if (points.length < 2) {
        return {
          x: section.startPoint.x,
          y: section.startPoint.y,
          horizontal: true,
        };
      }

      let chosen = null;
      for (let index = 0; index < points.length - 1; index += 1) {
        const a = points[index];
        const b = points[index + 1];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const horizontal = Math.abs(dx) >= Math.abs(dy);
        const length = horizontal ? Math.abs(dx) : Math.abs(dy);
        const candidate = { a, b, horizontal, length };
        if (!chosen || candidate.length > chosen.length || (candidate.horizontal && !chosen.horizontal)) {
          chosen = candidate;
        }
      }

      if (!chosen) {
        const mid = {
          x: (section.startPoint.x + section.endPoint.x) / 2,
          y: (section.startPoint.y + section.endPoint.y) / 2,
        };
        return {
          ...mid,
          horizontal: true,
          a: section.startPoint,
          b: section.endPoint,
          length: Math.abs(section.endPoint.x - section.startPoint.x),
        };
      }

      return {
        x: (chosen.a.x + chosen.b.x) / 2,
        y: (chosen.a.y + chosen.b.y) / 2,
        horizontal: chosen.horizontal,
        a: chosen.a,
        b: chosen.b,
        length: chosen.length,
      };
    }

    function boxesIntersect(a, b, padding = 0) {
      return !(
        (a.x + a.width + padding) < b.x ||
        (b.x + b.width + padding) < a.x ||
        (a.y + a.height + padding) < b.y ||
        (b.y + b.height + padding) < a.y
      );
    }

    function svgBoxForNode(node, pad) {
      return {
        x: Number(node.x || 0) + pad,
        y: Number(node.y || 0) + pad,
        width: Number(node.width || 0),
        height: Number(node.height || 0),
      };
    }

    function translatedBox(box, dx, dy) {
      return {
        x: box.x + dx,
        y: box.y + dy,
        width: box.width,
        height: box.height,
      };
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function applyLabelOffset(labelGroup, text, dx, dy) {
      labelGroup.setAttribute('transform', `translate(${dx}, ${dy})`);
      Array.from(text.querySelectorAll('tspan')).forEach(tspan => {
        tspan.setAttribute('x', String(Number(tspan.dataset.baseX || '0') + dx));
      });
    }

    function resolveEdgeLabelOffset(baseBox, anchor, lane, occupiedBoxes) {
      const perpendicularStep = anchor.horizontal ? 18 : 22;
      const alongStep = anchor.horizontal ? 36 : 30;
      const preferredDirection = lane < 0 ? -1 : 1;
      const candidates = [{ dx: 0, dy: 0 }];
      const usableSpan = Math.max(0, Number(anchor.length || 0) - (anchor.horizontal ? baseBox.width : baseBox.height) - 24);
      const maxAlong = Math.max(0, usableSpan / 2);

      for (let distance = 1; distance <= 5; distance += 1) {
        const along = Math.min(maxAlong, alongStep * distance);
        if (along <= 0) {
          continue;
        }
        if (anchor.horizontal) {
          candidates.push({ dx: along, dy: 0 });
          candidates.push({ dx: -along, dy: 0 });
          candidates.push({ dx: along, dy: preferredDirection * perpendicularStep });
          candidates.push({ dx: -along, dy: preferredDirection * perpendicularStep });
        } else {
          candidates.push({ dx: 0, dy: along });
          candidates.push({ dx: 0, dy: -along });
          candidates.push({ dx: preferredDirection * perpendicularStep, dy: along });
          candidates.push({ dx: preferredDirection * perpendicularStep, dy: -along });
        }
      }

      for (let distance = 1; distance <= 4; distance += 1) {
        const perpendicular = preferredDirection * perpendicularStep * distance;
        if (anchor.horizontal) {
          candidates.push({ dx: 0, dy: perpendicular });
          candidates.push({ dx: clamp(alongStep * distance, -maxAlong, maxAlong), dy: perpendicular });
          candidates.push({ dx: clamp(-alongStep * distance, -maxAlong, maxAlong), dy: perpendicular });
          candidates.push({ dx: 0, dy: -perpendicular });
        } else {
          candidates.push({ dx: perpendicular, dy: 0 });
          candidates.push({ dx: perpendicular, dy: clamp(alongStep * distance, -maxAlong, maxAlong) });
          candidates.push({ dx: perpendicular, dy: clamp(-alongStep * distance, -maxAlong, maxAlong) });
          candidates.push({ dx: -perpendicular, dy: 0 });
        }
      }

      for (const candidate of candidates) {
        const shifted = translatedBox(baseBox, candidate.dx, candidate.dy);
        if (!occupiedBoxes.some(box => boxesIntersect(shifted, box, 8))) {
          return candidate;
        }
      }

      return { dx: 0, dy: 0 };
    }

    function bindDiagramControls(section) {
      section.querySelectorAll('.diagram-card').forEach(card => {
        if (card.dataset.controlsBound === 'true') return;
        card.dataset.controlsBound = 'true';
        const wrap = card.querySelector('.diagram-wrap');
        const surfaceNode = wrap && (wrap.querySelector('.mermaid-graph') || wrap.querySelector('.elk-graph') || wrap.querySelector('.diagram-surface'));
        const buttons = card.querySelectorAll('[data-diagram-zoom]');
        if (!wrap || !surfaceNode) return;
        buttons.forEach(button => {
          button.addEventListener('click', () => {
            const current = parseFloat(surfaceNode.dataset.scale || '1');
            const mode = button.dataset.diagramZoom;
            const next = mode === 'in'
              ? Math.min(2.5, current + 0.2)
              : mode === 'out'
                ? Math.max(0.6, current - 0.2)
                : 1;
            applyDiagramScale(surfaceNode, next);
          });
        });
        wrap.addEventListener('wheel', event => {
          if (!(event.metaKey || event.ctrlKey)) return;
          event.preventDefault();
          const current = parseFloat(surfaceNode.dataset.scale || '1');
          const direction = event.deltaY < 0 ? 0.2 : -0.2;
          const next = Math.max(0.6, Math.min(2.5, current + direction));
          applyDiagramScale(surfaceNode, next);
        }, { passive: false });
      });
    }

    async function renderElkGraph(container) {
      const graph = JSON.parse(container.dataset.graph);
      const elk = window.__forgeElk || (window.__forgeElk = new ELK());
      const layout = await elk.layout(graph);
      const pad = 16;
      const svgNs = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNs, 'svg');
      svg.setAttribute('class', 'diagram-svg');
      svg.setAttribute('width', String((layout.width || 0) + pad * 2));
      svg.setAttribute('height', String((layout.height || 0) + pad * 2));
      svg.setAttribute('viewBox', `0 0 ${(layout.width || 0) + pad * 2} ${(layout.height || 0) + pad * 2}`);

      const defs = document.createElementNS(svgNs, 'defs');
      const marker = document.createElementNS(svgNs, 'marker');
      marker.setAttribute('id', 'arrowhead');
      marker.setAttribute('markerWidth', '10');
      marker.setAttribute('markerHeight', '10');
      marker.setAttribute('refX', '8');
      marker.setAttribute('refY', '5');
      marker.setAttribute('orient', 'auto');
      const arrowPath = document.createElementNS(svgNs, 'path');
      arrowPath.setAttribute('d', 'M 0 0 L 10 5 L 0 10 z');
      arrowPath.setAttribute('fill', '#d1d9e0');
      marker.appendChild(arrowPath);
      defs.appendChild(marker);
      svg.appendChild(defs);

      const edgeLayer = document.createElementNS(svgNs, 'g');
      const labelLayer = document.createElementNS(svgNs, 'g');
      const nodeLayer = document.createElementNS(svgNs, 'g');
      const pendingLabels = [];

      const edges = layout.edges || [];
      edges.forEach(edge => {
        const forge = edge.forge || {};
        const section = edge.sections && edge.sections[0];
        if (!section) return;
        const points = [section.startPoint, ...(section.bendPoints || []), section.endPoint]
          .map(point => `${point.x + pad},${point.y + pad}`)
          .join(' ');
        const polyline = document.createElementNS(svgNs, 'polyline');
        polyline.setAttribute('points', points);
        polyline.setAttribute('class', `elk-edge ${forge.style === 'dashed' ? 'dashed' : ''}`.trim());
        polyline.setAttribute('marker-end', 'url(#arrowhead)');
        edgeLayer.appendChild(polyline);

        const label = String(forge.label || '').trim();
        if (label && forge.showLabel !== false) {
          const lane = Number(forge.labelLane || 0);
          const anchor = labelAnchorPoint(section);
          const offsetY = anchor.horizontal ? lane * 18 : lane * 10;
          const offsetX = anchor.horizontal ? 0 : lane * 22;
          const text = document.createElementNS(svgNs, 'text');
          text.setAttribute('class', 'elk-edge-label');
          text.setAttribute('x', String(anchor.x + pad + offsetX));
          text.setAttribute('y', String(anchor.y + pad + offsetY));
          text.setAttribute('text-anchor', 'middle');
          const lines = wrapLabelText(label, Number(forge.labelWrap || 18));
          lines.forEach((line, index) => {
            const tspan = document.createElementNS(svgNs, 'tspan');
            const baseX = anchor.x + pad + offsetX;
            tspan.dataset.baseX = String(baseX);
            tspan.setAttribute('x', String(baseX));
            tspan.setAttribute('dy', index === 0 ? '0' : '14');
            tspan.textContent = line;
            text.appendChild(tspan);
          });
          const labelGroup = document.createElementNS(svgNs, 'g');
          labelGroup.appendChild(text);
          labelLayer.appendChild(labelGroup);
          const bbox = text.getBBox();
          const bg = document.createElementNS(svgNs, 'rect');
          bg.setAttribute('class', 'elk-edge-label-bg');
          bg.setAttribute('x', String(bbox.x - 6));
          bg.setAttribute('y', String(bbox.y - 2));
          bg.setAttribute('width', String(bbox.width + 12));
          bg.setAttribute('height', String(bbox.height + 4));
          bg.setAttribute('rx', '4');
          labelGroup.insertBefore(bg, text);
          pendingLabels.push({
            labelGroup,
            text,
            anchor,
            lane,
            box: {
              x: bbox.x - 6,
              y: bbox.y - 2,
              width: bbox.width + 12,
              height: bbox.height + 4,
            },
          });
        }
      });

      (layout.children || []).forEach(node => {
        const forge = node.forge || {};
        const group = document.createElementNS(svgNs, 'g');
        group.setAttribute('class', `elk-node ${forge.kind || ''}`.trim());
        group.setAttribute('transform', `translate(${(node.x || 0) + pad}, ${(node.y || 0) + pad})`);
        if (forge.target) {
          group.dataset.target = forge.target;
        }
        if (String(forge.kind || '').startsWith('deploy-')) {
          drawDeploymentShape(svgNs, group, forge, node);
        } else {
          const shape = (forge.kind === 'actor' || forge.kind === 'dependency') ? 'ellipse' : 'rect';
          const shapeEl = document.createElementNS(svgNs, shape);
          if (shape === 'ellipse') {
            shapeEl.setAttribute('cx', String((node.width || 0) / 2));
            shapeEl.setAttribute('cy', String((node.height || 0) / 2));
            shapeEl.setAttribute('rx', String((node.width || 0) / 2));
            shapeEl.setAttribute('ry', String((node.height || 0) / 2));
          } else {
            shapeEl.setAttribute('width', String(node.width || 0));
            shapeEl.setAttribute('height', String(node.height || 0));
            shapeEl.setAttribute('rx', '10');
          }
          group.appendChild(shapeEl);
        }

        const label = document.createElementNS(svgNs, 'text');
        label.setAttribute('class', 'label');
        const kind = String(forge.kind || '');
        const textLayout = kind.startsWith('deploy-')
          ? deploymentTextLayout(kind, node)
          : nodeTextLayout(kind, node);
        label.setAttribute('x', String(textLayout.labelX));
        label.setAttribute('text-anchor', 'middle');
        const labelLines = wrapNodeLines(forge.label || node.id, textLayout.labelMaxChars);
        const isCenteredBlock = Boolean(textLayout.centered) || kind.startsWith('deploy-');
        const labelStartY = isCenteredBlock
          ? centeredTextStartY(labelLines.length, 18, textLayout.labelY, 6)
          : textLayout.labelY;
        label.setAttribute('y', String(labelStartY));
        labelLines.forEach((line, index) => {
          const tspan = document.createElementNS(svgNs, 'tspan');
          tspan.setAttribute('x', String(textLayout.labelX));
          tspan.setAttribute('dy', index === 0 ? '0' : '18');
          tspan.textContent = line;
          label.appendChild(tspan);
        });
        group.appendChild(label);

        const subtitle = document.createElementNS(svgNs, 'text');
        subtitle.setAttribute('class', 'subtitle');
        subtitle.setAttribute('x', String(textLayout.subtitleX));
        subtitle.setAttribute('text-anchor', 'middle');
        const subtitleLines = wrapLabelText(forge.subtitle || '', textLayout.subtitleMaxChars);
        const subtitleStartY = isCenteredBlock
          ? centeredTextStartY(subtitleLines.length, 14, textLayout.subtitleY, 4)
          : textLayout.subtitleY;
        subtitle.setAttribute('y', String(subtitleStartY));
        subtitleLines.forEach((line, index) => {
          const tspan = document.createElementNS(svgNs, 'tspan');
          tspan.setAttribute('x', String(textLayout.subtitleX));
          tspan.setAttribute('dy', index === 0 ? '0' : '14');
          tspan.textContent = line;
          subtitle.appendChild(tspan);
        });
        group.appendChild(subtitle);

        if (forge.icon && !String(forge.kind || '').startsWith('deploy-')) {
          const icon = document.createElementNS(svgNs, 'text');
          icon.setAttribute('class', 'icon');
          icon.setAttribute('x', '16');
          icon.setAttribute('y', '24');
          icon.textContent = forge.icon;
          group.appendChild(icon);
        }

        if (forge.target) {
          group.addEventListener('click', () => { void activateSection(forge.target); });
        }
        nodeLayer.appendChild(group);
      });

      svg.appendChild(edgeLayer);
      svg.appendChild(nodeLayer);
      const occupiedBoxes = (layout.children || []).map(node => svgBoxForNode(node, pad));
      pendingLabels.forEach(({ labelGroup, text, anchor, lane, box }) => {
        const { dx, dy } = resolveEdgeLabelOffset(box, anchor, lane, occupiedBoxes);
        applyLabelOffset(labelGroup, text, dx, dy);
        occupiedBoxes.push(translatedBox(box, dx, dy));
      });
      svg.appendChild(labelLayer);
      container.innerHTML = '';
      container.appendChild(svg);
      container.classList.add('diagram-surface');
      normalizeSvgBounds(container);
      container.dataset.elkRendered = 'true';
      applyDiagramScale(container, parseFloat(container.dataset.scale || String(getInitialDiagramScale(container))));
    }

    async function renderSectionGraphs(section) {
      if (!section) return;
      const mermaidGraphs = Array.from(section.querySelectorAll('.mermaid-graph'));
      const pendingMermaid = mermaidGraphs.filter(node => node.dataset.mermaidRendered !== 'true');
      const graphs = Array.from(section.querySelectorAll('.elk-graph'));
      const pending = graphs.filter(node => !node.dataset.elkRendered);
      if (!pending.length) {
        for (const node of pendingMermaid) {
          await renderMermaidGraph(node);
        }
        bindDiagramControls(section);
        return;
      }
      try {
        for (const node of pending) {
          await renderElkGraph(node);
        }
        for (const node of pendingMermaid) {
          await renderMermaidGraph(node);
        }
        bindDiagramControls(section);
      } catch (error) {
        console.error(error);
      }
    }

    async function renderMermaidGraph(container) {
      if (!window.mermaid || container.dataset.mermaidRendered === 'true') return;
      const source = container.querySelector('.mermaid');
      if (!source) return;
      await window.mermaid.run({ nodes: [source] });
      container.dataset.mermaidRendered = 'true';
      normalizeSystemContextGraph(container);
      normalizeSvgBounds(container);
      applyDiagramScale(container, parseFloat(container.dataset.scale || String(getInitialDiagramScale(container))));
    }

    function normalizeSectionId(id) {
      return !id || id === 'overview' ? 'system-overview' : id;
    }

    async function activateSection(id, updateHash = true) {
      const normalizedId = normalizeSectionId(id);
      const targetSection = sections.find(section => section.id === normalizedId);
      if (!targetSection) return;
      const group = targetSection.dataset.group;
      sections.forEach(section => section.classList.toggle('active', section.id === normalizedId));
      itemButtons.forEach(button => button.classList.toggle('active', button.dataset.target === normalizedId));
      setActiveGroup(group, normalizedId);
      enhanceDataOverviewPersistenceChips();
      enhanceContainerDetailSections();
      enhanceComponentDiagrams();
      enhanceEntityDetailSections();
      enhanceFlowDetailSections();
      if (updateHash) {
        window.location.hash = normalizedId;
      }
      window.scrollTo({ top: 0, behavior: 'auto' });
      await renderSectionGraphs(targetSection);
    }

    function activateGroup(group) {
      const fallbackTarget = GROUP_OVERVIEW_TARGETS[group]
        || sections.find(section => section.dataset.group === group)?.id;
      if (fallbackTarget) {
        void activateSection(fallbackTarget);
        return;
      }
      const first = itemButtons.find(button => button.dataset.group === group);
      if (first) {
        void activateSection(first.dataset.target);
      }
    }

    window.graphNavigate = function (nodeId) {
      const target = GRAPH_TARGETS[nodeId];
      if (target) {
        void activateSection(target);
      }
    };

    function bindNavigation() {
      document.addEventListener('click', event => {
        const element = event.target.closest('[data-target]');
        if (!element) return;
        void activateSection(element.dataset.target);
      });
      document.addEventListener('keydown', event => {
        const element = event.target.closest('[data-target]');
        if (!element) return;
        if (event.key !== 'Enter' && event.key !== ' ') return;
        event.preventDefault();
        void activateSection(element.dataset.target);
      });
      tabs.forEach(tab => {
        tab.addEventListener('click', () => activateGroup(tab.dataset.group));
      });
    }

    function bindEnvironmentSelectors() {
      document.querySelectorAll('[data-environment-select]').forEach(select => {
        if (select.dataset.bound === 'true') return;
        select.dataset.bound = 'true';
        select.addEventListener('change', () => {
          const section = select.closest('.section') || document;
          section.querySelectorAll('[data-environment-panel]').forEach(panel => {
            panel.hidden = panel.dataset.environmentPanel !== select.value;
          });
        });
      });
    }

    function enhanceDataOverviewPersistenceChips() {
      document.querySelectorAll('#data-overview .record-row[data-target^="entity-"]').forEach(row => {
        if (row.dataset.persistenceEnhanced === 'true') return;
        row.dataset.persistenceEnhanced = 'true';
        const entityId = row.dataset.target.replace(/^entity-/, '');
        const targetSection = document.getElementById(row.dataset.target);
        if (!targetSection) return;

        const persistence = Array.from(targetSection.querySelectorAll('pre'))
          .map(pre => {
            try {
              return JSON.parse(pre.textContent);
            } catch {
              return null;
            }
          })
          .find(payload => (
            payload
            && payload.entity === entityId
            && (payload.storage_model || payload.physical_store || payload.table || payload.lifecycle)
          ));
        if (!persistence) return;

        let chipList = row.querySelector('.record-side .pill-list');
        if (!chipList) {
          const side = row.querySelector('.record-side');
          if (!side) return;
          chipList = document.createElement('div');
          chipList.className = 'pill-list';
          Array.from(side.querySelectorAll('.kind-chip')).forEach(chip => chipList.appendChild(chip));
          side.appendChild(chipList);
        }

        const existing = new Set(Array.from(chipList.querySelectorAll('.kind-chip')).map(chip => chip.textContent.trim()));
        const chipSpecs = [
          ['chip-storage', persistence.storage_model],
          ['chip-deploy', persistence.physical_store],
          ['chip-table', persistence.table],
        ];
        if (persistence.lifecycle && Array.isArray(persistence.lifecycle.states) && persistence.lifecycle.states.length) {
          chipSpecs.push(['chip-lifecycle', `${persistence.lifecycle.states.length} states`]);
        }

        chipSpecs.forEach(([cssClass, label]) => {
          if (!label || existing.has(label)) return;
          const chip = document.createElement('span');
          chip.className = `kind-chip ${cssClass}`;
          chip.textContent = label;
          chipList.appendChild(chip);
        });
      });
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, character => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[character]));
    }

    function refText(value) {
      if (!value || typeof value !== 'object') return String(value || '');
      return ['container', 'component', 'ref']
        .map(key => value[key])
        .filter(Boolean)
        .join(' / ');
    }

    function rawPayloadDetails(label, payload) {
      return (
        '<details class="payload-expandable">'
        + `<summary>${escapeHtml(label)}</summary>`
        + `<div class="schema-viewer"><pre>${escapeHtml(JSON.stringify(payload, null, 2))}</pre></div>`
        + '</details>'
      );
    }

    function metadataSummary(items) {
      return items
        .filter(([, value]) => String(value || '').trim())
        .map(([label, value]) => (
          '<div class="metadata-summary-item">'
          + `<span class="metadata-summary-label">${escapeHtml(label)}</span>`
          + `<span class="metadata-summary-value">${escapeHtml(value)}</span>`
          + '</div>'
        ))
        .join('');
    }

    function componentRowsHtml(components) {
      const rows = components.map(component => {
        const payload = component.payload && typeof component.payload === 'object' ? component.payload : component;
        const id = component.id || payload.id || '';
        const role = payload.role || component.role || '';
        const description = payload.description || component.description || '';
        const source = [component.source, component.line].filter(Boolean).join(':');
        const responsibilities = Array.isArray(payload.responsibilities || component.responsibilities)
          ? (payload.responsibilities || component.responsibilities)
          : [];
        const responsibilityItems = responsibilities
          .filter(item => String(item || '').trim())
          .map(item => `<li>${escapeHtml(item)}</li>`)
          .join('');
        return (
          '<details class="component-table-row component-expandable-row">'
          + '<summary class="component-row-head">'
          + '<div>'
          + `<h5>${escapeHtml(id)}</h5>`
          + (source ? `<span class="component-source">${escapeHtml(source)}</span>` : '')
          + '</div>'
          + (role ? `<span class="kind-chip chip-storage">${escapeHtml(role)}</span>` : '')
          + '<span class="entity-shape-chevron" aria-hidden="true"></span>'
          + '</summary>'
          + '<div class="component-row-body">'
          + (description ? `<p>${escapeHtml(description)}</p>` : '')
          + (responsibilityItems
            ? '<div class="component-responsibilities">'
              + '<span class="component-row-label">Responsibilities</span>'
              + `<ul>${responsibilityItems}</ul>`
              + '</div>'
            : '')
          + '</div>'
          + '</details>'
        );
      }).join('');
      return rows ? `<div class="component-table">${rows}</div>` : '';
    }

    function dataShapeRowsHtml(shapes) {
      const rows = shapes.map(shape => {
        const payload = shape.payload && typeof shape.payload === 'object' ? shape.payload : shape;
        const id = shape.id || payload.id || '';
        const kind = payload.type_kind || payload.kind || '';
        const source = [shape.source, shape.line].filter(Boolean).join(':');
        return (
          '<div class="component-table-row data-shape-row">'
          + '<div class="component-row-head">'
          + '<div>'
          + `<h5>${escapeHtml(id)}</h5>`
          + (source ? `<span class="component-source">${escapeHtml(source)}</span>` : '')
          + '</div>'
          + (kind ? `<span class="kind-chip chip-shape">${escapeHtml(kind)}</span>` : '')
          + '</div>'
          + '</div>'
        );
      }).join('');
      return rows ? `<div class="component-table data-shape-table">${rows}</div>` : '';
    }

    function operationRowsHtml(operations) {
      const rows = operations.map(operation => {
        const payload = operation.payload && typeof operation.payload === 'object' ? operation.payload : operation;
        const id = operation.id || payload.id || '';
        const source = [operation.source, operation.line].filter(Boolean).join(':');
        const chip = payload.component || payload.local_flow || payload.container_flow || 'operation';
        const ioRows = [
          ['Input', payload.input],
          ['Returns', payload.returns],
        ].filter(([, value]) => String(value || '').trim()).map(([label, value]) => (
          `<tr><th>${escapeHtml(label)}</th><td>${escapeHtml(value)}</td></tr>`
        )).join('');
        const logicItems = Array.isArray(payload.logic)
          ? payload.logic.filter(item => String(item || '').trim()).map(item => `<li>${escapeHtml(item)}</li>`).join('')
          : '';
        const participation = Array.isArray(payload.participates_in) ? payload.participates_in : [];
        const participationRows = participation.map(item => (
          '<tr>'
          + `<td>${escapeHtml(item.container_flow)}</td>`
          + `<td>${escapeHtml(item.local_flow)}</td>`
          + `<td>${escapeHtml(item.step)}</td>`
          + `<td>${escapeHtml(item.passes)}</td>`
          + '</tr>'
        )).join('');
        return (
          '<details class="component-table-row component-expandable-row operation-row">'
          + '<summary class="component-row-head">'
          + '<div>'
          + `<h5>${escapeHtml(id)}</h5>`
          + (source ? `<span class="component-source">${escapeHtml(source)}</span>` : '')
          + '</div>'
          + `<span class="kind-chip chip-deploy">${escapeHtml(chip)}</span>`
          + '<span class="entity-shape-chevron" aria-hidden="true"></span>'
          + '</summary>'
          + '<div class="operation-row-body">'
          + (ioRows
            ? '<div class="metadata-table-wrap operation-io-table"><table class="metadata-table">'
              + ioRows
              + '</table></div>'
            : '')
          + (logicItems
            ? '<div class="component-responsibilities">'
              + '<span class="component-row-label">Logic</span>'
              + `<ul>${logicItems}</ul>`
              + '</div>'
            : '')
          + (participationRows
            ? '<details class="payload-expandable operation-participation-details">'
              + `<summary>Participation (${participation.length})</summary>`
              + '<div class="metadata-table-wrap"><table class="metadata-table operation-participation-table">'
              + '<tr><th>Flow</th><th>Local Flow</th><th>Step</th><th>Passes</th></tr>'
              + participationRows
              + '</table></div>'
              + '</details>'
            : '')
          + '</div>'
          + '</details>'
        );
      }).join('');
      return rows ? `<div class="component-table operation-table">${rows}</div>` : '';
    }

    function readableCellText(cell) {
      if (!cell) return '';
      return Array.from(cell.childNodes).map(node => {
        if (node.nodeName === 'BR') return '\n';
        return node.textContent || '';
      }).join('').replace(/\n{2,}/g, '\n').trim();
    }

    function flowOperationRowsHtml(operations, stepNumber) {
      const groups = new Map();
      const containerLabelForLocalFlow = (operation, payload, localFlow) => {
        if (operation.container || payload.container) return operation.container || payload.container;
        if (String(localFlow || '').endsWith('_frontend')) return 'frontend_ui';
        if (String(localFlow || '').endsWith('_backend')) return 'backend_api';
        return 'container';
      };
      operations.forEach(operation => {
        const payload = operation.payload && typeof operation.payload === 'object' ? operation.payload : {};
        const entries = [];
        if (String(payload.step || '') === stepNumber) entries.push(payload);
        if (Array.isArray(payload.participates_in)) {
          payload.participates_in.forEach(item => {
            if (item && typeof item === 'object' && String(item.step || '') === stepNumber) entries.push(item);
          });
        }
        entries.forEach(entry => {
          const localFlow = entry.local_flow || payload.local_flow || 'local_flow';
          const container = containerLabelForLocalFlow(operation, payload, localFlow);
          const groupKey = `${container}::${localFlow}`;
          if (!groups.has(groupKey)) groups.set(groupKey, []);
          groups.get(groupKey).push(operation);
        });
      });
      return Array.from(groups.entries()).map(([groupKey, groupOperations]) => {
        const [container, localFlow] = groupKey.split('::');
        return (
        '<details class="flow-local-group">'
        + '<summary>'
        + '<span>'
        + `<strong>${escapeHtml(container || 'container')}</strong>`
        + `<em>${escapeHtml(localFlow || 'local_flow')}</em>`
        + '</span>'
        + `<span>${groupOperations.length} operations</span>`
        + '</summary>'
        + '<div class="flow-operation-list">'
        + groupOperations.map(operation => {
          const payload = operation.payload && typeof operation.payload === 'object' ? operation.payload : {};
          const source = [operation.source, operation.line].filter(Boolean).join(':');
          const ioItems = [
            ['Input', payload.input],
            ['Returns', payload.returns],
          ].filter(([, value]) => String(value || '').trim()).map(([label, value]) => (
            `<li><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></li>`
          )).join('');
          const logicItems = Array.isArray(payload.logic)
            ? payload.logic.filter(item => String(item || '').trim()).map(item => `<li>${escapeHtml(item)}</li>`).join('')
            : '';
          return (
            '<details class="flow-operation-row">'
            + '<summary>'
            + '<span>'
            + `<strong>${escapeHtml(operation.id || payload.id || '')}</strong>`
            + (source ? `<em>${escapeHtml(source)}</em>` : '')
            + '</span>'
            + '<span></span>'
            + '<span class="entity-shape-chevron" aria-hidden="true"></span>'
            + '</summary>'
            + (ioItems ? `<ul class="flow-step-io flow-operation-io">${ioItems}</ul>` : '')
            + (logicItems
              ? '<div class="flow-step-logic"><span>Logic</span><ul>' + logicItems + '</ul></div>'
              : '')
            + '</details>'
          );
        }).join('')
        + '</div>'
        + '</details>'
        );
      }).join('');
    }

    function flowStepRowHtml({ number, edge, input, output, logic }, operations = []) {
      const logicItems = String(logic || '')
        .split(/\n+/)
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => `<li>${escapeHtml(item)}</li>`)
        .join('');
      const operationGroups = flowOperationRowsHtml(operations, String(number || ''));
      return (
        '<details class="flow-step-row">'
        + '<summary class="flow-step-summary">'
        + `<span class="flow-step-index">${escapeHtml(number)}</span>`
        + '<span class="flow-step-visible">'
        + `<strong>${escapeHtml(edge)}</strong>`
        + '</span>'
        + '<span class="entity-shape-chevron" aria-hidden="true"></span>'
        + '</summary>'
        + '<div class="flow-step-content">'
        + '<ul class="flow-step-io">'
        + `<li><span>Input</span><strong>${escapeHtml(input)}</strong></li>`
        + `<li><span>Output</span><strong>${escapeHtml(output)}</strong></li>`
        + '</ul>'
        + (logicItems ? '<div class="flow-step-logic"><span>Logic</span><ul>' + logicItems + '</ul></div>' : '')
        + (operationGroups
          ? '<div class="flow-step-local"><span class="component-row-label">Local flows and operations</span>'
            + operationGroups
            + '</div>'
          : '')
        + '</div>'
        + '</details>'
      );
    }

    function flowStepRowsFromTable(table, operations = []) {
      const bodyRows = Array.from(table.querySelectorAll('tr')).slice(1);
      const rows = bodyRows.map(row => {
        const cells = Array.from(row.children);
        const [numberCell, edgeCell, inputCell, outputCell, logicCell] = cells;
        return flowStepRowHtml({
          number: readableCellText(numberCell),
          edge: readableCellText(edgeCell),
          input: readableCellText(inputCell),
          output: readableCellText(outputCell),
          logic: readableCellText(logicCell),
        }, operations);
      }).join('');
      return rows ? `<div class="flow-step-list">${rows}</div>` : '';
    }

    function enhanceFlowDetailSections() {
      document.querySelectorAll('.section[id^="flow-"]').forEach(section => {
        const cards = Array.from(section.querySelectorAll(':scope > .card'));
        const operationCard = cards.find(card => card.querySelector(':scope > h4')?.textContent.trim() === 'Extracted Operations');
        const operations = operationCard ? annotationCardsFromSection(operationCard) : [];
        section.querySelectorAll('.diagram-card .diagram-header p').forEach(copy => {
          if (copy.textContent.includes('table')) {
            copy.textContent = 'Numbered edges correspond to the flow steps below.';
          }
        });
        Array.from(section.querySelectorAll(':scope > .card > table')).forEach(table => {
          const headers = Array.from(table.querySelectorAll('tr:first-child th'))
            .map(header => header.textContent.trim().toLowerCase());
          const isFlowTable = ['#', 'edge', 'input', 'output', 'logic']
            .every((header, index) => headers[index] === header);
          if (!isFlowTable) return;
          const rows = flowStepRowsFromTable(table, operations);
          if (rows) {
            table.insertAdjacentHTML('beforebegin', rows);
          }
          table.remove();
        });
        section.querySelectorAll('.flow-step-list > div.flow-step-row').forEach(row => {
          const number = readableCellText(row.querySelector('.flow-step-index'));
          const edge = readableCellText(row.querySelector('.flow-step-edge'));
          const fields = Array.from(row.querySelectorAll('.flow-step-field strong')).map(readableCellText);
          const logic = readableCellText(row.querySelector('.flow-step-logic ul'));
          row.insertAdjacentHTML('beforebegin', flowStepRowHtml({
            number,
            edge,
            input: fields[0] || '',
            output: fields[1] || '',
            logic,
          }, operations));
          row.remove();
        });
        if (operationCard) {
          operationCard.remove();
        }
        cards
          .filter(card => card.querySelector('.diagram-header h3')?.textContent.trim().startsWith('Local Flow:'))
          .forEach(card => card.remove());
      });
    }

    function annotationCardsFromSection(card) {
      return Array.from(card.querySelectorAll(':scope > .card')).map(child => {
        const pre = child.querySelector('pre');
        let payload = {};
        if (pre) {
          try {
            payload = JSON.parse(pre.textContent);
          } catch {
            payload = {};
          }
        }
        const sourceText = child.querySelector('p')?.textContent.trim() || '';
        const sourceParts = sourceText.match(/^(.*):(\d+)$/);
        return {
          id: child.querySelector('h3')?.textContent.trim() || payload.id || '',
          source: sourceParts ? sourceParts[1] : sourceText,
          line: sourceParts ? sourceParts[2] : '',
          payload,
        };
      }).filter(item => item.id || item.payload.id);
    }

    function enhanceContainerDetailSections() {
      document.querySelectorAll('.section[id^="container-"]').forEach(section => {
        const cards = Array.from(section.querySelectorAll(':scope .container-stack > .card'));
        const componentCard = cards.find(card => card.querySelector(':scope > h4')?.textContent.trim() === 'Components');
        if (componentCard && !componentCard.querySelector('.component-table')) {
          const rows = componentRowsHtml(annotationCardsFromSection(componentCard));
          if (rows) {
            componentCard.classList.add('component-table-card');
            componentCard.innerHTML = '<h4>Components</h4>' + rows;
          }
        }

        const dataShapeCard = cards.find(card => card.querySelector(':scope > h4')?.textContent.trim() === 'Data Shapes');
        if (dataShapeCard && !dataShapeCard.querySelector('.data-shape-table')) {
          const rows = dataShapeRowsHtml(annotationCardsFromSection(dataShapeCard));
          if (rows) {
            dataShapeCard.classList.add('data-shape-table-card');
            dataShapeCard.innerHTML = '<h4>Data Shapes</h4>' + rows;
          }
        }

        const operationCard = cards.find(card => card.querySelector(':scope > h4')?.textContent.trim() === 'Operations');
        if (operationCard && !operationCard.querySelector('.operation-table')) {
          const rows = operationRowsHtml(annotationCardsFromSection(operationCard));
          if (rows) {
            operationCard.classList.add('operation-table-card');
            operationCard.innerHTML = '<h4>Operations</h4>' + rows;
          }
        }
      });
    }

    function enhanceComponentDiagrams() {
      document.querySelectorAll('.diagram-card').forEach(card => {
        const title = card.querySelector('.diagram-header h3')?.textContent.trim();
        if (title !== 'Extracted Components' && title !== 'Container Components') return;
        card.classList.add('diagram-card-compact');
        const source = card.querySelector('pre.mermaid');
        if (!source || source.dataset.componentCompacted === 'true') return;
        const lines = source.textContent.split('\n');
        const nodeIds = lines
          .map(line => line.match(/^\s*([A-Za-z][A-Za-z0-9_]*)\s*(?:\[|\(|\{|\>)/)?.[1])
          .filter(Boolean);
        if (nodeIds.length > 1 && !source.textContent.includes('~~~')) {
          const spacerLines = [];
          for (let index = 0; index < nodeIds.length - 1; index += 1) {
            spacerLines.push(`  ${nodeIds[index]} ~~~ ${nodeIds[index + 1]}`);
          }
          source.textContent = `${source.textContent.trim()}\n${spacerLines.join('\n')}`;
        }
        source.dataset.componentCompacted = 'true';
      });
    }

    function enhanceEntityDetailSections() {
      document.querySelectorAll('.section[id^="entity-"]').forEach(section => {
        if (section.dataset.entityEnhanced === 'true') return;
        const entityPre = section.querySelector(':scope > .card pre');
        if (!entityPre) return;
        let entity;
        try {
          entity = JSON.parse(entityPre.textContent);
        } catch {
          return;
        }
        section.dataset.entityEnhanced = 'true';

        const payloads = Array.from(section.querySelectorAll('pre')).slice(1).map(pre => {
          try {
            return JSON.parse(pre.textContent);
          } catch {
            return null;
          }
        }).filter(Boolean);
        const shapes = payloads.filter(payload => payload.entity === entity.id && payload.shape);
        const persistence = payloads.filter(payload => (
          payload.entity === entity.id
          && (payload.storage_model || payload.physical_store || payload.table || payload.access_patterns)
        ));

        const summary = metadataSummary([
          ['Category', entity.category],
          ['Canonical Type', refText(entity.canonical_type)],
          ['Logical Owner', refText(entity.logical_owner)],
          ['Persisted In', refText(entity.persisted_in)],
        ]);
        const security = entity.security
          ? '<div class="metadata-table-wrap"><table class="metadata-table">'
            + `<tr><th>Security</th><td>${escapeHtml(entity.security)}</td></tr>`
            + '</table></div>'
          : '';

        const lifecycle = entity.lifecycle || {};
        const lifecycleStates = Array.isArray(lifecycle.states)
          ? lifecycle.states.map(state => `<span class="kind-chip chip-lifecycle">${escapeHtml(state)}</span>`).join('')
          : '';
        const lifecycleRows = Array.isArray(lifecycle.transitions)
          ? lifecycle.transitions.map(item => (
            '<tr>'
            + `<td>${escapeHtml(item.from)}</td>`
            + `<td>${escapeHtml(item.to)}</td>`
            + `<td>${escapeHtml(item.condition)}</td>`
            + '</tr>'
          )).join('')
          : '';
        const lifecycleDiagramRows = Array.isArray(lifecycle.transitions)
          ? lifecycle.transitions.map(item => (
            '<div class="entity-state-transition">'
            + `<span class="entity-state-node">${escapeHtml(item.from)}</span>`
            + '<span class="entity-state-arrow" aria-hidden="true">&rarr;</span>'
            + `<span class="entity-state-node">${escapeHtml(item.to)}</span>`
            + '</div>'
          )).join('')
          : '';
        const lifecycleDiagram = lifecycleDiagramRows
          ? `<div class="entity-state-diagram">${lifecycleDiagramRows}</div>`
          : `<div class="entity-state-diagram entity-state-diagram-flat">${lifecycleStates}</div>`;
        const lifecycleCard = lifecycleStates || lifecycleRows
          ? '<div class="card entity-lifecycle-card"><h4>Lifecycle</h4>'
            + lifecycleDiagram
            + (lifecycleRows
              ? '<details class="payload-expandable lifecycle-transition-details">'
                + `<summary>Transitions (${lifecycle.transitions.length})</summary>`
                + '<div class="metadata-table-wrap"><table class="metadata-table lifecycle-transition-table">'
                + '<colgroup><col class="lifecycle-col-state"><col class="lifecycle-col-state"><col class="lifecycle-col-condition"></colgroup>'
                + '<tr><th>From</th><th>To</th><th>Condition</th></tr>'
                + lifecycleRows
                + '</table></div>'
                + '</details>'
              : '')
            + '</div>'
          : '';

        const shapeRows = shapes.map(payload => (
            '<details class="entity-shape-row">'
            + '<summary>'
            + `<span class="entity-shape-name">${escapeHtml(payload.id)}</span>`
            + `<span class="kind-chip chip-shape">${escapeHtml(payload.type_kind)}</span>`
            + '<span class="entity-shape-chevron" aria-hidden="true"></span>'
            + '</summary>'
            + `<div class="schema-viewer"><pre>${escapeHtml(JSON.stringify(payload.shape || {}, null, 2))}</pre></div>`
            + '</details>'
        )).join('');
        const shapesCard = '<div class="card entity-shapes-card"><h4>Related Data Shapes</h4>'
          + (shapeRows
            ? `<div class="entity-shape-list">${shapeRows}</div>`
            : '<p>No related data shapes.</p>')
          + '</div>';

        const persistenceBlocks = persistence.map(payload => {
          const summaryHtml = metadataSummary([
            ['Storage Model', payload.storage_model],
            ['Physical Store', payload.physical_store],
            ['Table', payload.table],
            ['Migrations', payload.migrations_path],
          ]);
          const patterns = Array.isArray(payload.access_patterns)
            ? `<ul>${payload.access_patterns.map(pattern => `<li>${escapeHtml(pattern)}</li>`).join('')}</ul>`
            : '';
          const rows = [
            ['Access Patterns', patterns],
            ['Security', escapeHtml(payload.security || '')],
          ].filter(([, value]) => String(value || '').trim()).map(([label, value]) => (
            `<tr><th>${escapeHtml(label)}</th><td>${value}</td></tr>`
          )).join('');
          return (
            '<div class="entity-persistence-block">'
            + `<div class="metadata-summary metadata-summary-compact">${summaryHtml}</div>`
            + `<div class="metadata-table-wrap"><table class="metadata-table">${rows}</table></div>`
            + rawPayloadDetails('Raw Persistence Payload', payload)
            + '</div>'
          );
        }).join('');
        const persistenceCard = '<div class="card entity-persistence-card"><h4>Persistence</h4>'
          + (persistenceBlocks || '<p>No persistence annotation.</p>')
          + '</div>';

        section.innerHTML = (
          '<div class="entity-detail-stack">'
          + '<div class="card entity-summary-card">'
          + '<div class="card-header">'
          + `<h3>${escapeHtml(entity.id)}</h3>`
          + `<div class="pill-list"><span class="kind-chip chip-persistent">${escapeHtml(entity.category)}</span></div>`
          + '</div>'
          + `<p>${escapeHtml(entity.description)}</p>`
          + `<div class="metadata-summary metadata-summary-compact">${summary}</div>`
          + security
          + rawPayloadDetails('Raw Entity Payload', entity)
          + '</div>'
          + lifecycleCard
          + shapesCard
          + persistenceCard
          + '</div>'
        );
      });
    }
    if (window.mermaid) {
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        flowchart: {
          curve: 'basis',
          htmlLabels: true,
          nodeSpacing: 52,
          rankSpacing: 86,
        },
        theme: 'base',
        themeVariables: {
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
          primaryColor: '#ffffff',
          primaryBorderColor: '#d1d9e0',
          primaryTextColor: '#1f2328',
          lineColor: '#8c959f',
          edgeLabelBackground: '#ffffff',
          tertiaryColor: '#f6f8fa',
        },
      });
    }

    function watchAuditVersion() {
      let knownVersion = '';
      const check = async () => {
        try {
          const response = await fetch('/__forge_audit_version', { cache: 'no-store' });
          if (!response.ok) return;
          const payload = await response.json();
          const nextVersion = String(payload.version || '');
          if (!knownVersion) {
            knownVersion = nextVersion;
            return;
          }
          if (nextVersion && nextVersion !== knownVersion) {
            window.location.reload();
          }
        } catch {
          // The live server may have stopped; leave the current audit page usable.
        }
      };
      setInterval(() => { void check(); }, 2000);
      void check();
    }

    bindNavigation();
    bindEnvironmentSelectors();
    enhanceDataOverviewPersistenceChips();
    enhanceContainerDetailSections();
    enhanceComponentDiagrams();
    enhanceEntityDetailSections();
    enhanceFlowDetailSections();
    window.addEventListener('hashchange', () => {
      const target = window.location.hash.replace('#', '');
      if (target) {
        void activateSection(target, false);
      }
    });
    watchAuditVersion();
    const rawInitial = window.location.hash.replace('#', '');
    void activateSection(rawInitial);
  </script>
</body>
</html>
