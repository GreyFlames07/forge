# Canonical supporting-docs/implementation-plan.yaml shape.
# Generated by forge-implement; edited by human during A4 pause; consumed
# by the orchestrator to spawn subagents in dep-graph order.

generated_at: "<ISO-8601 timestamp>"
scope: project-wide

architecture:
  # All fields per J2. Populated by forge-implement from spec inference +
  # UI consultation + human edits.

  # Repo layout (E1)
  default_source_root: src/
  source_root_overrides:
    # <MOD>: <path>     # only modules that override
  module_dir_names:
    # <MOD>: <dir_name>
  flow_root: src/flows
  journey_root: src/journeys
  binary_entrypoints:
    # - cmd/app/main.go

  # Naming (E2) — per language
  atom_naming_policy:
    typescript: camelCase_per_atom_file
    python:     snake_case_per_atom_file
    go:         snake_case_per_atom_file
    rust:       snake_case_per_atom_file
  unit_file_granularity: per_atom_file   # or per_module_file / hybrid
  test_placement: beside_source   # or central_tests_dir / hybrid

  # Test frameworks (E3) — per language, inferred or defaulted
  test_frameworks:
    typescript: vitest
    python:     pytest
    go:         built-in

  # Schema / IaC tools (E4) — per module
  schema_tools:
    # <MOD>: prisma | drizzle | raw-sql | sqlalchemy | alembic | ...
  iac_tools:
    # <MOD>: terraform | pulumi | aws-cdk | cloudformation | ...

  # UI (E5) — ELICITED, not inferred
  ui_framework:     react   # or vue / svelte / solid / angular / swiftui / flutter / jetpack-compose
  ui_styling:       css_modules   # or tailwind / styled-components / emotion / vanilla
  ui_design_system: none   # or shadcn / material / custom
  ui_responsive:    mobile-first   # or desktop-first / fluid
  ui_accessibility: not-specified   # or wcag-2.1-aa
  ui_theming:       light   # or dark / light-and-dark / multi-theme

  # Error handling pattern (F)
  error_handling:
    typescript: exceptions   # or result-type
    go:         error_return
    python:     exceptions
    rust:       result_type

  # Dependency injection (G)
  dependency_injection: direct_imports   # or factory / container / nest_di

  # Async patterns (H)
  async_patterns:
    typescript: async_await
    python:     async_await   # or sync

  # Module boundaries (I)
  module_boundaries: direct_imports   # or barrel_exports

  # Shared scaffolding locations (J)
  scaffolding:
    types_root:    src/generated/types
    constants_root: src/generated/constants
    fixtures_root: tests/fixtures

units:
  # Each unit represents one atom / flow / journey / artifact to build.
  # Order is topological with module-cohesion tie-breaking.

  - id:            "<entity_id>"                # e.g., atm.pay.charge_card
    kind:          "<kind>"                     # atom_PROCEDURAL | atom_DECLARATIVE | atom_COMPONENT | atom_MODEL | flow | journey | artifact
    depends_on:    []                           # list of entity ids whose status must be done before this can start
    status:        "pending"                    # pending | in_flight | done | failed | blocked | architecture_conflict
    target_files:                               # files this unit produces
      - "<path_to_implementation_file>"
      - "<path_to_test_file>"
      - "<path_to_audit_file>"
    # (additional optional fields — notes, manual_override — human can add during A4 edit)
